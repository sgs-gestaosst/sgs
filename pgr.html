<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGR — Programa de Gerenciamento de Riscos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3044;--border-focus:#4a7cdc;
  --accent:#4a7cdc;--accent2:#2dd4a0;--text:#e8eaf0;--text2:#8892a4;--text3:#545e72;
  --danger:#e05555;--warning:#e0a855;
  --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.screen-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.header-logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.08em;border:1px solid var(--border-focus);padding:4px 10px;border-radius:var(--radius);text-decoration:none;}
.screen-actions{margin-left:auto;display:flex;gap:10px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none;}
.btn-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-edit:hover{border-color:var(--border-focus);}
.btn-print{background:var(--accent2);color:#0f1117;}
.btn-print:hover{background:#3de8b4;}
.screen-body{padding:40px 24px;display:flex;justify-content:center;}
.pages-wrap{display:flex;flex-direction:column;gap:24px;align-items:center;width:100%;}

/* ── FOLHA A4 ── */
.page{
  background:#fff;width:210mm;min-height:297mm;
  padding:20mm 20mm 32mm 25mm;
  box-shadow:0 4px 32px rgba(0,0,0,.5);
  position:relative;color:#1a1a2e;
  font-family:'IBM Plex Sans',sans-serif;font-size:10pt;line-height:1.5;
}
.page::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:8mm;
  background:linear-gradient(180deg,#1a3a6e 0%,#0d2040 100%);
}

/* ── TIPOGRAFIA ── */
.doc-title{font-size:22pt;font-weight:700;color:#0d2040;line-height:1.2;margin-bottom:4pt;}
.doc-section{font-size:11pt;font-weight:700;color:#0d2040;text-transform:uppercase;letter-spacing:.06em;border-bottom:2pt solid #1a3a6e;padding-bottom:4pt;margin:16pt 0 10pt;}
.doc-subsection{font-size:10pt;font-weight:600;color:#2a5298;margin:10pt 0 6pt;}
.doc-text{font-size:9.5pt;color:#374151;line-height:1.6;text-align:justify;}
.num-secao{color:#4a7cdc;font-family:'IBM Plex Mono',monospace;font-size:9pt;margin-right:6pt;}

/* ── CAPA ── */
.capa{display:flex;flex-direction:column;height:100%;min-height:257mm;}
.capa-logos-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:40pt;}
.capa-logo-esq{display:flex;align-items:center;gap:12pt;}
.capa-logo-dir{display:flex;align-items:center;gap:10pt;opacity:.85;}
.capa-logo-dir-label{font-size:7pt;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:2pt;}
.capa-logo-dir-nome{font-size:9pt;font-weight:600;color:#374151;}
.capa-logo-box{width:50pt;height:50pt;background:#0d2040;display:flex;align-items:center;justify-content:center;border-radius:6pt;flex-shrink:0;}
.capa-logo-box-sm{width:38pt;height:38pt;background:#f3f4f6;border:1pt solid #e5e7eb;display:flex;align-items:center;justify-content:center;border-radius:5pt;flex-shrink:0;}
.capa-logo-text{font-family:'IBM Plex Mono',monospace;font-size:16pt;font-weight:700;color:#fff;}
.capa-logo-text-sm{font-family:'IBM Plex Mono',monospace;font-size:11pt;font-weight:700;color:#374151;}
.capa-divider{height:3pt;background:linear-gradient(90deg,#1a3a6e,#2a5298,#4a7cdc);margin:20pt 0;border-radius:2pt;}
.capa-titulo-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;}
.capa-pre{font-size:9pt;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:#2a5298;margin-bottom:8pt;}
.capa-titulo{font-size:28pt;font-weight:700;color:#0d2040;line-height:1.15;margin-bottom:6pt;}
.capa-titulo-sub{font-size:13pt;color:#4a7cdc;font-weight:400;margin-bottom:24pt;}
.capa-empresa-box{background:#f0f4ff;border-left:4pt solid #2a5298;padding:12pt 16pt;margin-bottom:20pt;border-radius:0 4pt 4pt 0;}
.capa-empresa-nome{font-size:15pt;font-weight:700;color:#0d2040;margin-bottom:3pt;}
.capa-empresa-cnpj{font-size:9pt;color:#6b7280;font-family:'IBM Plex Mono',monospace;}
.capa-badges{display:flex;gap:8pt;flex-wrap:wrap;margin-top:10pt;}
.capa-badge{padding:3pt 10pt;border-radius:20pt;font-size:8pt;font-weight:600;border:1pt solid;}
.badge-gr1{background:#e6fff9;color:#047857;border-color:#6ee7b7;}
.badge-gr2{background:#eff6ff;color:#1d4ed8;border-color:#93c5fd;}
.badge-gr3{background:#fffbeb;color:#92400e;border-color:#fcd34d;}
.badge-gr4{background:#fff1f2;color:#9f1239;border-color:#fca5a5;}
.badge-info{background:#f3f4f6;color:#374151;border-color:#d1d5db;}
.capa-footer{border-top:1pt solid #e5e7eb;padding-top:10pt;display:flex;justify-content:space-between;align-items:center;}
.capa-footer-label{font-size:8pt;color:#9ca3af;}
.capa-footer-value{font-size:9pt;color:#374151;font-weight:500;}

/* ── HEADER/FOOTER PÁGINAS ── */
.page-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1pt solid #e5e7eb;padding-bottom:8pt;margin-bottom:14pt;}
.ph-empresa{font-size:8pt;font-weight:600;color:#374151;}
.ph-doc{font-size:8pt;color:#9ca3af;font-family:'IBM Plex Mono',monospace;}
.page-footer{position:absolute;bottom:12mm;left:25mm;right:20mm;display:flex;justify-content:space-between;align-items:center;border-top:1pt solid #e5e7eb;padding-top:6pt;}
.pf-label{font-size:7.5pt;color:#9ca3af;}
.pf-page{font-family:'IBM Plex Mono',monospace;font-size:8pt;color:#6b7280;}
/* Garante espaço para o rodapé absoluto na tela */
.page{padding-bottom:28mm;}

/* ── TABELAS ── */
.doc-table{width:100%;border-collapse:collapse;margin:8pt 0;font-size:8.5pt;}
.doc-table th{background:#0d2040;color:#fff;padding:5pt 7pt;text-align:left;font-size:7.5pt;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.doc-table td{padding:5pt 7pt;border-bottom:1pt solid #e5e7eb;vertical-align:top;}
.doc-table tr:nth-child(even) td{background:#f9fafb;}
.doc-table tr:last-child td{border-bottom:none;}

/* ── FICHAS ── */
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1pt solid #e5e7eb;border-radius:4pt;overflow:hidden;margin:8pt 0;}
.ficha-grid-3{grid-template-columns:1fr 1fr 1fr;}
.ficha-item{padding:8pt 10pt;border-right:1pt solid #e5e7eb;border-bottom:1pt solid #e5e7eb;}
.ficha-item:nth-child(2n){border-right:none;}
.ficha-grid-3 .ficha-item:nth-child(3n){border-right:none;}
.ficha-item:last-child,.ficha-item:nth-last-child(2){border-bottom:none;}
.ficha-label{font-size:7pt;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:2pt;}
.ficha-value{font-size:9.5pt;color:#1a1a2e;font-weight:500;}
.ficha-full{grid-column:1/-1;border-right:none!important;}

/* ── INVENTÁRIO DE RISCOS — OPÇÃO C ── */
.funcao-bloco{
  border:1.5pt solid #c7d7f9;
  border-radius:6pt;
  margin:14pt 0;
  overflow:hidden;
  page-break-inside:avoid;
  box-shadow:0 1pt 4pt rgba(42,82,152,.08);
}
.funcao-bloco-header{
  background:linear-gradient(90deg,#0d2040 0%,#1a3a6e 100%);
  padding:9pt 12pt;
  border-bottom:2pt solid #2a5298;
  display:flex;align-items:center;justify-content:space-between;gap:8pt;
}
.funcao-bloco-nome{font-size:11pt;font-weight:700;color:#ffffff;}
.funcao-bloco-cbo{font-size:8pt;color:#93c5fd;font-family:'IBM Plex Mono',monospace;}
.funcao-bloco-setores{font-size:8pt;color:#bfdbfe;background:rgba(255,255,255,.12);padding:2pt 8pt;border-radius:10pt;border:1pt solid rgba(255,255,255,.2);}

/* Risco dentro da função */
.risco-funcao{border-bottom:1pt solid #f3f4f6;padding:8pt 10pt;}
.risco-funcao:last-child{border-bottom:none;}
.risco-funcao-header{display:flex;align-items:flex-start;gap:8pt;margin-bottom:5pt;}
.risco-cat-pill{font-size:7pt;padding:2pt 7pt;border-radius:3pt;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;flex-shrink:0;}
.risco-perigo-pill{font-size:7pt;padding:2pt 7pt;border-radius:3pt;background:#f3f4f6;color:#6b7280;border:1pt solid #e5e7eb;white-space:nowrap;flex-shrink:0;}
.risco-funcao-nome{font-size:9.5pt;font-weight:600;color:#0d2040;flex:1;}
.nivel-pill{font-size:7.5pt;padding:2pt 8pt;border-radius:3pt;font-weight:700;white-space:nowrap;flex-shrink:0;}
.nivel-MUITO-ALTO{background:#fee2e2;color:#991b1b;}
.nivel-ALTO{background:#ffedd5;color:#9a3412;}
.nivel-MEDIO{background:#fef9c3;color:#854d0e;}
.nivel-BAIXO{background:#dcfce7;color:#166534;}

.risco-funcao-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6pt;margin-bottom:6pt;}
.rf-field .lbl{font-size:6.5pt;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2pt;}
.rf-field .val{font-size:8.5pt;color:#374151;font-weight:500;}

.danos-box{background:#fff7ed;border-left:3pt solid #fb923c;padding:5pt 8pt;margin-bottom:5pt;border-radius:0 3pt 3pt 0;}
.danos-label{font-size:6.5pt;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9a3412;margin-bottom:2pt;}
.danos-text{font-size:8pt;color:#374151;line-height:1.5;}

.medidas-box{margin-top:5pt;}
.medidas-label{font-size:6.5pt;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:4pt;}
.medida-item{display:flex;gap:6pt;align-items:flex-start;margin-bottom:3pt;}
.medida-num{width:14pt;height:14pt;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7pt;font-weight:700;flex-shrink:0;}
.medida-label{font-size:7.5pt;font-weight:600;width:65pt;flex-shrink:0;padding-top:1pt;}
.medida-desc{font-size:8pt;color:#374151;flex:1;line-height:1.4;}
.medida-vazio{font-size:7.5pt;color:#9ca3af;font-style:italic;}

/* ── MATRIZ EPI ── */
.epi-matrix-table{width:100%;border-collapse:collapse;font-size:8pt;margin:8pt 0;}
.epi-matrix-table th{background:#0d2040;color:#fff;padding:5pt 7pt;font-size:7.5pt;font-weight:600;text-transform:uppercase;letter-spacing:.03em;text-align:left;}
.epi-matrix-table td{padding:5pt 7pt;border-bottom:1pt solid #e5e7eb;vertical-align:top;}
.epi-matrix-table tr:nth-child(even) td{background:#f9fafb;}
.epi-pill{display:inline-block;background:#ede9fe;color:#5b21b6;border:1pt solid #c4b5fd;border-radius:3pt;padding:1pt 6pt;font-size:7pt;font-weight:600;margin:1pt 2pt 1pt 0;}
.ca-pill{display:inline-block;background:#f3f4f6;color:#374151;border:1pt solid #e5e7eb;border-radius:3pt;padding:1pt 5pt;font-size:6.5pt;font-family:'IBM Plex Mono',monospace;}

/* ── SEÇÕES EM BREVE ── */
.em-breve{background:#f9fafb;border:1pt dashed #d1d5db;border-radius:4pt;padding:16pt;text-align:center;margin:10pt 0;}
.em-breve-icon{font-size:20pt;margin-bottom:6pt;}
.em-breve-label{font-size:9pt;color:#9ca3af;font-style:italic;}

/* ── PRINT ── */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:#fff!important;margin:0!important;padding:0!important;}
  .screen-header{display:none!important;}
  .screen-body{padding:0!important;}
  .pages-wrap{gap:0!important;display:block!important;}

  @page{size:A4;margin:0;}

  body{counter-reset:pagina 0;}

  .page{
    box-shadow:none!important;
    margin:0!important;
    width:210mm!important;
    height:297mm!important;
    min-height:297mm!important;
    max-height:297mm!important;
    overflow:hidden!important;
    padding:12mm 14mm 14mm 20mm!important;
    border-left:8mm solid #0d2040!important;
    page-break-after:always!important;
    break-after:page!important;
    position:relative!important;
    counter-increment:pagina!important;
  }
  .page::before{display:none!important;}
  .page:last-child{page-break-after:auto!important;break-after:auto!important;}

  /* Rodapé absoluto dentro da página */
  .page-footer{
    position:absolute!important;
    bottom:8mm!important;
    left:20mm!important;
    right:14mm!important;
    margin-top:0!important;
    border-top:1pt solid #e5e7eb!important;
    padding-top:4pt!important;
    display:flex!important;
    justify-content:space-between!important;
  }

  /* Numeração automática */
  .pf-page::after{content:'Pág. ' counter(pagina);}

  /* Evita corte */
  .funcao-bloco{page-break-inside:avoid;break-inside:avoid;}
  .risco-funcao{page-break-inside:avoid;break-inside:avoid;}
  .danos-box{page-break-inside:avoid;break-inside:avoid;}
  .ficha-grid{page-break-inside:avoid;break-inside:avoid;}
  .doc-table tr{page-break-inside:avoid;break-inside:avoid;}
  .doc-table thead{display:table-header-group;}
}
@media(max-width:230mm){
  .page{width:100%;padding:15mm 12mm 15mm 18mm;}
  .page::before{width:5mm;}
}
/* ── BADGES AGENTES SETOR ── */
.agente-badge{display:inline-block;padding:2pt 7pt;border-radius:10pt;font-size:7pt;font-weight:600;margin:1pt 2pt 1pt 0;border:1pt solid;}
.agente-fisico{background:#fef9c3;color:#854d0e;border-color:#fde68a;}
.agente-quimico{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.agente-biologico{background:#f3e8ff;color:#6b21a8;border-color:#d8b4fe;}
.agente-ergonomico{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd;}
.agente-acidente{background:#ffedd5;color:#9a3412;border-color:#fdba74;}
.agente-psicossocial{background:#fce7f3;color:#9d174d;border-color:#f9a8d4;}
/* ── SETOR DETALHE ── */
.setor-detalhe{border:1pt solid #e5e7eb;border-radius:4pt;margin:8pt 0;overflow:hidden;page-break-inside:avoid;}
.setor-detalhe-header{background:#f0f4ff;padding:8pt 10pt;border-bottom:1pt solid #e5e7eb;display:flex;justify-content:space-between;align-items:flex-start;gap:8pt;}
.setor-detalhe-nome{font-size:10pt;font-weight:700;color:#0d2040;}
.setor-detalhe-body{padding:8pt 10pt;display:grid;grid-template-columns:1fr 1fr;gap:6pt;}
</style>
</head>
<body>

<div class="screen-header">
  <a href="index.html" class="header-logo">SGS</a>
  <span style="font-size:13px;color:var(--text2);">Visualização do documento</span>
  <div class="screen-actions">
    <button class="btn btn-edit" onclick="toggleElaboradora()" id="btn-elab">✏️ Empresa elaboradora</button>
    <button class="btn btn-edit" onclick="abrirModalPlanoAcao()">📋 Revisar plano de ação</button>
    <a id="btn-voltar" href="#" class="btn btn-edit">← Voltar</a>
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
  </div>
</div>

<!-- Painel elaboradora -->
<div id="painel-elaboradora" style="display:none;background:var(--surface2);border-bottom:1px solid var(--border);padding:16px 32px;">
  <div style="max-width:900px;margin:0 auto;">
    <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:16px;align-items:end;">
      <div>
        <label style="display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Logo</label>
        <div id="logo-preview" onclick="document.getElementById('elab-logo-input').click()"
          style="width:60px;height:60px;border-radius:8px;background:#1a2540;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;font-size:11px;color:var(--text3);text-align:center;line-height:1.3;">
          📷<br>Logo
        </div>
        <input type="file" id="elab-logo-input" accept="image/*" style="display:none;" onchange="carregarLogo(this)">
        <button onclick="removerLogo()" id="btn-remover-logo" style="display:none;margin-top:4px;font-size:10px;background:none;border:none;color:var(--danger);cursor:pointer;">✕ Remover</button>
      </div>
      <div>
        <label style="display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Nome da empresa elaboradora</label>
        <input type="text" id="elab-nome" placeholder="Ex: SST Consultoria Ltda" oninput="atualizarElaboradora()"
          style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">CNPJ</label>
        <input type="text" id="elab-cnpj" placeholder="00.000.000/0000-00" oninput="atualizarElaboradora()"
          style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Responsável técnico</label>
        <input type="text" id="elab-responsavel" placeholder="Nome do Técnico / Engenheiro" oninput="atualizarElaboradora()"
          style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;">
      </div>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3);">ℹ️ Estes dados aparecem na capa e rodapé. Preencha antes de imprimir.</div>
  </div>
</div>

<!-- Modal plano de ação -->
<div id="modal-plano" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:700px;width:100%;margin:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <div style="font-size:16px;font-weight:500;">📋 Revisar Plano de Ação</div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px;">Selecione as ações que aparecerão no documento</div>
      </div>
      <button onclick="fecharModalPlanoAcao()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;">×</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);">
      <input type="checkbox" id="plano-check-all" onchange="toggleTodasAcoes(this.checked)" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
      <label for="plano-check-all" style="font-size:12px;color:var(--text2);cursor:pointer;">Selecionar todas</label>
      <span id="plano-count" style="margin-left:auto;font-size:12px;color:var(--text3);"></span>
    </div>
    <div id="lista-plano-acoes" style="max-height:450px;overflow-y:auto;"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
      <button onclick="fecharModalPlanoAcao()" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border);padding:8px 16px;border-radius:var(--radius);font-family:var(--sans);font-size:13px;cursor:pointer;">Cancelar</button>
      <button onclick="aplicarSelecaoPlano()" style="background:var(--accent2);color:#0f1117;border:none;padding:8px 16px;border-radius:var(--radius);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;">✓ Aplicar ao documento</button>
    </div>
  </div>
</div>

<div class="screen-body">
  <div class="pages-wrap" id="pages-wrap">
    <div style="color:var(--text2);text-align:center;padding:40px;">Carregando documento...</div>
  </div>
</div>

<script>

const token=localStorage.getItem('sgs_token');
if(!token)window.location.href='login.html';

function escHtml(s){const str=s===null||s===undefined?'':(s+'');return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function headers(){return{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`};}

async function carregar(){
  try{
    const [resEmp,resCnaes,resSets,resFuncs,resFuncSets,resRiscos,resCats,resEpis,resPerigos]=await Promise.all([
      fetch(`${SUPA_URL}/rest/v1/empresas?id=eq.${empresaId}&select=*`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/empresa_cnaes?empresa_id=eq.${empresaId}&select=*&order=tipo.asc`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/setores?empresa_id=eq.${empresaId}&ativo=eq.true&select=*&order=nome_setor.asc`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/funcoes?empresa_id=eq.${empresaId}&ativo=eq.true&select=*&order=nome_funcao.asc`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/funcao_setores?ativo=eq.true&select=funcao_id,setor_id,num_funcionarios_previsto`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/riscos?ativo=eq.true&select=*`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/categorias_risco?ativo=eq.true&select=*`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/catalogo_epis?ativo=eq.true&select=id,nome,categoria`,{headers:headers()}),
      fetch(`${SUPA_URL}/rest/v1/perigos?ativo=eq.true&select=id,nome,descricao,categoria_risco_id`,{headers:headers()}),
    ]);

    [empresa,cnaes,setores,funcoes,funcaoSetores,riscos,categorias,epis,perigos]=await Promise.all([
      resEmp.json().then(d=>d[0]),
      resCnaes.json(),resSets.json(),resFuncs.json(),resFuncSets.json(),
      resRiscos.json(),resCats.json(),resEpis.json(),resPerigos.json(),
    ]);

    // Busca setor_riscos e funcao_riscos filtrados pela empresa (via setores)
    const setorIds=setores.map(s=>s.id);
    const funcaoIds=funcoes.map(f=>f.id);

    if(setorIds.length){
      const [resSR,resMedS]=await Promise.all([
        fetch(`${SUPA_URL}/rest/v1/setor_riscos?setor_id=in.(${setorIds.join(',')})&ativo=eq.true&select=*`,{headers:headers()}),
        fetch(`${SUPA_URL}/rest/v1/setor_risco_medidas?ativo=eq.true&select=*`,{headers:headers()}),
      ]);
      setor_riscos=await resSR.json();
      medidas_setor=await resMedS.json();
    }else{setor_riscos=[];medidas_setor=[];}

    if(funcaoIds.length){
      const resFR=await fetch(`${SUPA_URL}/rest/v1/funcao_riscos?funcao_id=in.(${funcaoIds.join(',')})&ativo=eq.true&select=*`,{headers:headers()});
      funcao_riscos=await resFR.json();
      if(funcao_riscos.length){
        const frIds=funcao_riscos.map(fr=>fr.id).join(',');
        const resMedF=await fetch(`${SUPA_URL}/rest/v1/funcao_risco_medidas?funcao_risco_id=in.(${frIds})&ativo=eq.true&select=*`,{headers:headers()});
        medidas_funcao=await resMedF.json();
      }else{medidas_funcao=[];}
    }else{funcao_riscos=[];medidas_funcao=[];}

    // SESMT
    const resSesmtCalc=await fetch(`${SUPA_URL}/rest/v1/rpc/calcular_sesmt_empresa`,{
      method:'POST',headers:{'Content-Type':'application/json',...headers()},
      body:JSON.stringify({p_empresa_id:parseInt(empresaId)})
    });
    window.sesmtCalc=await resSesmtCalc.json();

    const resSesmt=await fetch(`${SUPA_URL}/rest/v1/dimensionamento_sesmt?empresa_id=eq.${empresaId}&select=*&limit=1`,{headers:headers()});
    const sesmtArr=await resSesmt.json();
    window.sesmtData=sesmtArr[0]||null;

    // Ações
    const resAcoes=await fetch(`${SUPA_URL}/rest/v1/acoes?empresa_id=eq.${empresaId}&ativo=eq.true&select=*&order=prioridade.asc,prazo.asc`,{headers:headers()});
    window.acoesData=await resAcoes.json();

    // Campanhas psicossociais encerradas com resultados
    const resCampanhas=await fetch(`${SUPA_URL}/rest/v1/campanhas_psicossocial?empresa_id=eq.${empresaId}&status=eq.Encerrada&ativo=eq.true&select=*&order=data_fim.desc`,{headers:headers()});
    window.campanhasPsi=await resCampanhas.json();
    if(window.campanhasPsi.length){
      const campIds=window.campanhasPsi.map(c=>c.id).join(',');
      const resCF=await fetch(`${SUPA_URL}/rest/v1/campanha_funcoes?campanha_id=in.(${campIds})&ativo=eq.true&select=*`,{headers:headers()});
      window.campanhaFuncoesPsi=await resCF.json();
      if(window.campanhaFuncoesPsi.length){
        const cfIds=window.campanhaFuncoesPsi.map(cf=>cf.id).join(',');
        const resRes=await fetch(`${SUPA_URL}/rest/v1/resultados_copsoq?campanha_funcao_id=in.(${cfIds})&select=*`,{headers:headers()});
        window.resultadosPsi=await resRes.json();
      }else{window.resultadosPsi=[];}
    }else{window.campanhaFuncoesPsi=[];window.resultadosPsi=[];}

    renderDocumento();
  }catch(e){
    document.getElementById('pages-wrap').innerHTML=`<div style="color:#e05555;text-align:center;padding:40px;">Erro ao carregar: ${e.message}</div>`;
    console.error(e);
  }
}

    if(numEl)numEl.textContent=`Pág. ${i+1}`;

    const primSec=pg.querySelector('.doc-section');

  // Monta badge de agentes para cada setor
  function agentesSetor(s){

// ── INVENTÁRIO DE RISCOS POR FUNÇÃO ───────────────────────────
function renderInventarioRiscos(){
  const paginas=[];

  // Mapa setor por função
  const setoresPorFuncao={};
  funcaoSetores.forEach(fs=>{
    if(!setoresPorFuncao[fs.funcao_id])setoresPorFuncao[fs.funcao_id]=[];
    const s=setores.find(x=>x.id===fs.setor_id);
    if(s)setoresPorFuncao[fs.funcao_id].push(s.nome_setor);
  });

  const funcoesComRiscos=funcoes.filter(f=>funcao_riscos.filter(fr=>fr.funcao_id===f.id).length>0);

  if(!funcoesComRiscos.length){
    const pg=criarPagina();
    pg.innerHTML=`
    ${phHeader()}
    <div class="doc-section"><span class="num-secao">4</span>Inventário de Riscos Ocupacionais</div>
    <div class="em-breve">
      <div class="em-breve-icon">⚠️</div>
      <div class="em-breve-label">Nenhum risco identificado ainda.<br>Acesse o módulo de Riscos para vincular perigos e riscos às funções.</div>
    </div>
    ${pfFooter()}`;
    paginas.push(pg);
    return paginas;
  }

  // Gera HTML de cada bloco de função
  function gerarBlocoFuncao(funcao){
    const frs=funcao_riscos.filter(fr=>fr.funcao_id===funcao.id);
    const setoresNomes=setoresPorFuncao[funcao.id]||[];
    const setoresDaFuncao=funcaoSetores.filter(fs=>fs.funcao_id===funcao.id).map(fs=>setores.find(s=>s.id===fs.setor_id)).filter(Boolean);
    const agentesMap=[
      {key:'tem_agente_fisico',label:'Físico',cls:'agente-fisico'},
      {key:'tem_agente_quimico',label:'Químico',cls:'agente-quimico'},
      {key:'tem_agente_biologico',label:'Biológico',cls:'agente-biologico'},
      {key:'tem_agente_ergonomico',label:'Ergonômico',cls:'agente-ergonomico'},
      {key:'tem_agente_acidente',label:'Acidente',cls:'agente-acidente'},
      {key:'tem_agente_psicossocial',label:'Psicossocial',cls:'agente-psicossocial'},
    ];
    const badgesAgentes=agentesMap.filter(a=>setoresDaFuncao.some(s=>s[a.key])).map(a=>`<span class="agente-badge ${a.cls}">${a.label}</span>`).join('');

    let html=`<div class="funcao-bloco">
      <div class="funcao-bloco-header">
        <div>
          <div class="funcao-bloco-nome">👷 ${h(funcao.nome_funcao)}</div>
          ${funcao.cbo?`<div class="funcao-bloco-cbo">CBO: ${h(funcao.cbo)}</div>`:''}
          ${badgesAgentes?`<div style="margin-top:4pt;">${badgesAgentes}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4pt;">
          ${setoresNomes.length?`<span class="funcao-bloco-setores">📁 Setor(es): ${h(setoresNomes.join(' · '))}</span>`:''}
          <span style="font-size:7.5pt;color:#9ca3af;">${frs.length} risco(s)</span>
        </div>
      </div>`;

    const PROB_LABEL={1:'Muito baixa',2:'Baixa',3:'Média',4:'Alta',5:'Muito alta'};
    const SEV_LABEL={1:'Insignificante',2:'Leve',3:'Moderada',4:'Grave',5:'Catastrófica'};

    frs.forEach(fr=>{
      const risco=getRisco(fr.risco_id);if(!risco)return;
      const catCor=getCatCor(risco.categoria_risco_id);
      const catNome=getCatNome(risco.categoria_risco_id);
      const perigo=fr.perigo_id?getPerigo(fr.perigo_id):null;
      const mds=medidas_funcao.filter(m=>m.funcao_risco_id===fr.id);
      const episFr=mds.filter(m=>m.nivel==='EPI'&&m.epi_id);
      const medidasItens=MEDIDAS_CONFIG.map(mc=>{
        if(mc.key==='epi'){
          if(!episFr.length)return'';
          return`<div class="medida-item">
            <div class="medida-num" style="background:${mc.bg};color:${mc.cor};">5</div>
            <div class="medida-label" style="color:${mc.cor};">${mc.label}</div>
            <div class="medida-desc">${episFr.map(e=>{const epiDados=epis.find(x=>x.id===e.epi_id);return`${h(epiDados?.nome||'EPI')}${e.ca?' (CA:'+h(e.ca)+')':''}${e.validade_ca?' Val:'+fmtData(e.validade_ca):''}`;}).join(' · ')}</div>
          </div>`;
        }
        const marcada=fr[`medida_${mc.key}`];const desc=fr[`medida_${mc.key}_desc`];
        if(!marcada&&!desc)return'';
        return`<div class="medida-item">
          <div class="medida-num" style="background:${mc.bg};color:${mc.cor};">${{elim:1,subs:2,eng:3,adm:4}[mc.key]}</div>
          <div class="medida-label" style="color:${mc.cor};">${mc.label}</div>
          <div class="medida-desc">${desc?h(desc):'<span style="color:#9ca3af;font-style:italic;">Medida indicada — descrição não preenchida</span>'}</div>
        </div>`;
      }).filter(Boolean).join('');

      html+=`<div class="risco-funcao">
        <div class="risco-funcao-header">
          <span class="risco-cat-pill" style="background:${catCor.bg};color:${catCor.color};">${catNome}</span>
          ${perigo?`<span class="risco-perigo-pill">⚠ Perigo: ${h(perigo.nome)}</span>`:''}
          <span class="risco-funcao-nome">${h(risco.nome_risco)}</span>
          ${fr.nivel_risco?`<span class="nivel-pill nivel-${fr.nivel_risco}">${nivelLabel(fr.nivel_risco)}</span>`:''}
        </div>
        <div class="risco-funcao-grid" style="grid-template-columns:1fr 1fr 1fr;">
          <div class="rf-field"><div class="lbl">Probabilidade</div><div class="val">${fr.probabilidade?h(PROB_LABEL[fr.probabilidade]||'—'):'—'}</div></div>
          <div class="rf-field"><div class="lbl">Severidade</div><div class="val">${fr.severidade?h(SEV_LABEL[fr.severidade]||'—'):'—'}</div></div>
          <div class="rf-field"><div class="lbl">Nº de expostos</div><div class="val">${fr.num_expostos||'—'}</div></div>
        </div>
        ${risco.danos_saude?`<div class="danos-box"><div class="danos-label">🩺 Danos à saúde potenciais</div><div class="danos-text">${h(risco.danos_saude)}</div></div>`:''}
        ${medidasItens?`<div class="medidas-box"><div class="medidas-label">Medidas de prevenção e controle (Hierarquia NR-1)</div>${medidasItens}</div>`:''}
      </div>`;
    });

    html+='</div>';
    return html;
  }

  // Paginação por altura real — usa elemento temporário fora da tela
  const ALTURA_UTIL_MM=247; // 297mm - 12mm top - 12mm bottom - 16mm header - 10mm footer
  const MM_TO_PX=96/25.4;
  const ALTURA_UTIL_PX=ALTURA_UTIL_MM*MM_TO_PX;

  const container=document.createElement('div');
  container.style.cssText=`position:absolute;left:-9999px;top:0;width:170mm;font-family:'IBM Plex Sans',sans-serif;font-size:10pt;line-height:1.5;`;
  document.body.appendChild(container);

  let paginaAtual=criarPagina();
  let alturaUsada=0;
  let primeiraPagina=true;

  // Intro da seção
  const introHtml=`<div class="doc-section" style="margin-top:0;"><span class="num-secao">4</span>Inventário de Riscos Ocupacionais por Função</div>
  <p class="doc-text" style="margin-bottom:12pt;">O inventário a seguir apresenta os perigos identificados e os riscos associados, organizados por função, conforme levantamento realizado nos setores de trabalho. Para cada risco são indicados o nível de risco (Probabilidade × Severidade), os danos à saúde potenciais e as medidas de controle previstas na hierarquia da NR-1.</p>`;

  // Mede altura do intro
  container.innerHTML=introHtml;
  const alturaIntro=container.getBoundingClientRect().height;

  let htmlPaginaAtual=phHeader()+introHtml;
  alturaUsada=alturaIntro+60; // 60px para header+footer estimado
  primeiraPagina=true;

  funcoesComRiscos.forEach(funcao=>{
    const blocoHtml=gerarBlocoFuncao(funcao);
    container.innerHTML=blocoHtml;
    const alturaBloco=container.getBoundingClientRect().height;

    // Se não cabe na página atual, fecha e abre nova
    if(alturaUsada+alturaBloco>ALTURA_UTIL_PX&&!primeiraPagina){
      paginaAtual.innerHTML=htmlPaginaAtual+pfFooter();
      paginas.push(paginaAtual);
      paginaAtual=criarPagina();
      htmlPaginaAtual=phHeader();
      alturaUsada=60;
    }

    htmlPaginaAtual+=blocoHtml;
    alturaUsada+=alturaBloco;
    primeiraPagina=false;
  });

  // Última página
  paginaAtual.innerHTML=htmlPaginaAtual+pfFooter();
  paginas.push(paginaAtual);

  document.body.removeChild(container);
  return paginas;
}

// ── MATRIZ EPI POR FUNÇÃO ─────────────────────────────────────
function renderMatrizEPI(){
  const pg=criarPagina();

  // Monta mapa: funcao_id → lista de EPIs únicos com CA
  const episPorFuncao={};
  funcao_riscos.forEach(fr=>{
    const mds=medidas_funcao.filter(m=>m.funcao_risco_id===fr.id&&m.nivel==='EPI');
    if(!mds.length)return;
    if(!episPorFuncao[fr.funcao_id])episPorFuncao[fr.funcao_id]=[];
    mds.forEach(m=>{
      const jaExiste=episPorFuncao[fr.funcao_id].find(x=>x.epi_id===m.epi_id);
      if(!jaExiste)episPorFuncao[fr.funcao_id].push({epi_id:m.epi_id,ca:m.ca,validade_ca:m.validade_ca});
    });
  });

  const funcoesComEpi=funcoes.filter(f=>episPorFuncao[f.id]?.length>0);

  if(!funcoesComEpi.length){
    pg.innerHTML=`
    ${phHeader()}
    <div class="doc-section"><span class="num-secao">5</span>Matriz de EPI por Função</div>
    <div class="em-breve">
      <div class="em-breve-icon">🛡️</div>
      <div class="em-breve-label">Nenhum EPI vinculado às funções ainda.<br>Adicione EPIs nos riscos do módulo de Gestão de Riscos para gerar esta matriz.</div>
    </div>
    ${pfFooter()}`;
    return pg;
  }

  const linhas=funcoesComEpi.map(f=>{
    const episFuncao=episPorFuncao[f.id]||[];
    const episHtml=episFuncao.map(e=>{
      const epiDados=epis.find(x=>x.id===e.epi_id);
      return`<span class="epi-pill">🛡 ${h(epiDados?.nome||'EPI')}</span>${e.ca?`<span class="ca-pill">CA:${h(e.ca)}</span>`:''}${e.validade_ca?`<span class="ca-pill">Val:${fmtData(e.validade_ca)}</span>`:''}`;
    }).join(' ');

    // Setores desta função
    const setoresNomes=(funcaoSetores.filter(fs=>fs.funcao_id===f.id).map(fs=>setores.find(s=>s.id===fs.setor_id)?.nome_setor).filter(Boolean));

    return`<tr>
      <td style="font-weight:500;">${h(f.nome_funcao)}<br><span style="font-size:7pt;color:#9ca3af;">${h(setoresNomes.join(', '))}</span></td>
      <td style="text-align:center;font-weight:600;color:#0d2040;">${episFuncao.length}</td>
      <td>${episHtml}</td>
    </tr>`;
  }).join('');

  pg.innerHTML=`
  ${phHeader()}
  <div class="doc-section"><span class="num-secao">5</span>Matriz de EPI por Função</div>
  <p class="doc-text" style="margin-bottom:12pt;">A matriz a seguir consolida os Equipamentos de Proteção Individual (EPIs) indicados para cada função, com base nos riscos ocupacionais identificados no inventário deste PGR e nas medidas de controle estabelecidas conforme a hierarquia da NR-1. Os EPIs relacionados foram selecionados considerando a natureza dos agentes de risco, a intensidade da exposição e a viabilidade técnica das medidas de proteção coletiva disponíveis, em conformidade com os requisitos da NR-6. O empregador é responsável pelo fornecimento gratuito, orientação de uso, manutenção e substituição dos EPIs sempre que necessário, bem como por exigir e fiscalizar seu uso correto pelos trabalhadores.</p>
  <table class="epi-matrix-table">
    <thead>
      <tr>
        <th style="width:30%;">Função / Setor(es)</th>
        <th style="width:10%;text-align:center;">Qtd. EPIs</th>
        <th>EPIs obrigatórios (com Nº CA e Validade)</th>
      </tr>
    </thead>
    <tbody>${linhas}</tbody>
  </table>
  <p class="doc-text" style="margin-top:12pt;font-size:8.5pt;">* O Certificado de Aprovação (CA) é emitido pelo Ministério do Trabalho e Emprego (MTE) e atesta que o EPI passou pelos ensaios de resistência e eficácia exigidos. EPIs com CA vencido ou sem CA não devem ser fornecidos aos trabalhadores e devem ser imediatamente substituídos. O empregador deve capacitar o trabalhador quanto ao uso adequado, guarda e conservação de cada EPI, conforme NR-6.</p>
  ${pfFooter()}`;
  return pg;
}

  <div class="doc-section"><span class="num-secao">${numSecao}</span>Avaliação de Riscos Psicossociais</div>

  <div class="doc-subsection">${numSecao}.1 Base Legal</div>
  <p class="doc-text">A avaliação dos riscos psicossociais no trabalho é exigência da <strong>NR-1 — Disposições Gerais e Gerenciamento de Riscos Ocupacionais</strong>, atualizada pela Portaria MTE nº 1.419/2024, que incluiu os fatores psicossociais relacionados ao trabalho como agentes de risco a serem identificados, avaliados e controlados no Programa de Gerenciamento de Riscos (PGR). A referida norma determina que o empregador deve identificar os perigos e avaliar os riscos ocupacionais, incluindo aqueles decorrentes da organização do trabalho, das relações interpessoais e das condições psicossociais do ambiente laboral.</p>

  <div class="doc-subsection" style="margin-top:12pt;">${numSecao}.2 Metodologia Aplicada — COPSOQ III</div>
  <p class="doc-text">Para a avaliação dos riscos psicossociais foi adotada a metodologia <strong>COPSOQ III — Copenhagen Psychosocial Questionnaire</strong>, terceira versão do questionário desenvolvido pelo National Research Centre for the Working Environment (NRCWE) da Dinamarca, amplamente validado internacionalmente e adaptado para a língua portuguesa.</p>
  <p class="doc-text" style="margin-top:6pt;">O COPSOQ III é considerado uma das ferramentas mais completas e cientificamente robustas para avaliação de riscos psicossociais no trabalho. Sua versão curta, composta por <strong>23 itens</strong> organizados em <strong>12 dimensões</strong>, permite avaliar aspectos fundamentais da organização do trabalho, das relações sociais e do bem-estar dos trabalhadores, atendendo plenamente às exigências da NR-1 atualizada.</p>

  <div class="doc-subsection" style="margin-top:12pt;">${numSecao}.3 Dimensões Avaliadas</div>
  <p class="doc-text" style="margin-bottom:8pt;">O instrumento avalia as seguintes dimensões, agrupadas em <strong>demandas</strong> (fatores que podem gerar sobrecarga) e <strong>recursos</strong> (fatores protetores do trabalhador):</p>
  <table class="doc-table">
    <thead><tr><th style="width:40%;">Dimensão</th><th style="width:15%;text-align:center;">Tipo</th><th>Descrição resumida</th></tr></thead>
    <tbody>
      <tr><td><strong>Demandas quantitativas</strong></td><td style="text-align:center;"><span style="background:#fef2f2;color:#991b1b;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Demanda</span></td><td>Volume e ritmo de trabalho exigido</td></tr>
      <tr><td><strong>Ritmo de trabalho</strong></td><td style="text-align:center;"><span style="background:#fef2f2;color:#991b1b;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Demanda</span></td><td>Velocidade exigida para execução das tarefas</td></tr>
      <tr><td><strong>Exigências cognitivas</strong></td><td style="text-align:center;"><span style="background:#fef2f2;color:#991b1b;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Demanda</span></td><td>Concentração e memória exigidas pelo trabalho</td></tr>
      <tr><td><strong>Exigências emocionais</strong></td><td style="text-align:center;"><span style="background:#fef2f2;color:#991b1b;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Demanda</span></td><td>Envolvimento emocional exigido no trabalho</td></tr>
      <tr><td><strong>Autonomia e influência</strong></td><td style="text-align:center;"><span style="background:#f0fdf4;color:#166534;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Recurso</span></td><td>Capacidade de influenciar o próprio trabalho</td></tr>
      <tr><td><strong>Desenvolvimento profissional</strong></td><td style="text-align:center;"><span style="background:#f0fdf4;color:#166534;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Recurso</span></td><td>Oportunidades de aprendizado e crescimento</td></tr>
      <tr><td><strong>Suporte social dos colegas</strong></td><td style="text-align:center;"><span style="background:#f0fdf4;color:#166534;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Recurso</span></td><td>Apoio recebido dos colegas de trabalho</td></tr>
      <tr><td><strong>Suporte social da chefia</strong></td><td style="text-align:center;"><span style="background:#f0fdf4;color:#166534;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Recurso</span></td><td>Apoio recebido do superior imediato</td></tr>
      <tr><td><strong>Qualidade da liderança</strong></td><td style="text-align:center;"><span style="background:#f0fdf4;color:#166534;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Recurso</span></td><td>Competência e planejamento da liderança</td></tr>
      <tr><td><strong>Insegurança no trabalho</strong></td><td style="text-align:center;"><span style="background:#fef2f2;color:#991b1b;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Demanda</span></td><td>Preocupação com a estabilidade no emprego</td></tr>
      <tr><td><strong>Satisfação no trabalho</strong></td><td style="text-align:center;"><span style="background:#f0fdf4;color:#166534;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Recurso</span></td><td>Satisfação e motivação com o trabalho</td></tr>
      <tr><td><strong>Esgotamento (Burnout)</strong></td><td style="text-align:center;"><span style="background:#fef2f2;color:#991b1b;padding:1pt 5pt;border-radius:3pt;font-size:8pt;">Demanda</span></td><td>Nível de esgotamento físico e emocional</td></tr>
    </tbody>
  </table>

  <div class="doc-subsection" style="margin-top:12pt;">${numSecao}.4 Escala de Classificação</div>
  <p class="doc-text">Os resultados são expressos em escores de <strong>0 a 100</strong>. Para as dimensões de demanda, escores mais altos indicam maior exposição ao risco. Para as dimensões de recurso, escores mais altos indicam melhor condição. A classificação segue três faixas:</p>
  <div style="display:flex;gap:8pt;margin-top:8pt;">
    <div style="flex:1;background:#f0fdf4;border:1pt solid #86efac;border-radius:4pt;padding:8pt;text-align:center;">
      <div style="font-size:9pt;font-weight:700;color:#166534;">VERDE — Adequado</div>
      <div style="font-size:8pt;color:#374151;margin-top:2pt;">Condição favorável. Manter e monitorar.</div>
    </div>
    <div style="flex:1;background:#fffbeb;border:1pt solid #fde68a;border-radius:4pt;padding:8pt;text-align:center;">
      <div style="font-size:9pt;font-weight:700;color:#92400e;">AMARELO — Risco Moderado</div>
      <div style="font-size:8pt;color:#374151;margin-top:2pt;">Atenção necessária. Implementar melhorias.</div>
    </div>
    <div style="flex:1;background:#fef2f2;border:1pt solid #fca5a5;border-radius:4pt;padding:8pt;text-align:center;">
      <div style="font-size:9pt;font-weight:700;color:#991b1b;">VERMELHO — Alto Risco</div>
      <div style="font-size:8pt;color:#374151;margin-top:2pt;">Risco elevado. Intervenção imediata.</div>
    </div>
  </div>
  ${pfFooter(numSecao)}`;
  paginas.push(pg1);

  // Pega apenas o resultado mais recente por função
  const resultadosPorFuncao={};
  window.campanhasPsi.forEach(campanha=>{
    const cfs=window.campanhaFuncoesPsi.filter(cf=>cf.campanha_id===campanha.id);
    cfs.forEach(cf=>{
      const resultado=window.resultadosPsi.find(r=>r.campanha_funcao_id===cf.id);
      if(!resultado||!resultado.total_respondentes)return;
      // Como campanhas estão ordenadas por data_fim desc, a primeira encontrada é a mais recente
      if(!resultadosPorFuncao[cf.funcao_id]){
        resultadosPorFuncao[cf.funcao_id]={campanha,cf,resultado};
      }
    });
  });

  Object.values(resultadosPorFuncao).forEach(({campanha,cf,resultado})=>{
      const funcao=funcoes.find(f=>f.id===cf.funcao_id);
      if(!funcao)return;

      const pg=criarPagina();
      const dataFim=campanha.data_fim?new Date(campanha.data_fim+'T00:00:00').toLocaleDateString('pt-BR'):'—';

      const dimHtml=DIMENSOES_INFO.map(d=>{
        const score=resultado[`score_${d.key}`];
        const risco=resultado[`risco_${d.key}`];
        const c=corRisco(risco);
        const pct=score!=null?Math.round(score):0;
        return`<tr>
          <td style="font-size:8.5pt;">${d.nome}</td>
          <td style="text-align:center;font-size:7.5pt;">
            <span style="background:${d.tipo==='demanda'?'#fef2f2':'#f0fdf4'};color:${d.tipo==='demanda'?'#991b1b':'#166534'};padding:1pt 5pt;border-radius:3pt;">${d.tipo==='demanda'?'Demanda':'Recurso'}</span>
          </td>
          <td style="text-align:center;">
            <div style="background:#f3f4f6;border-radius:3pt;height:10pt;position:relative;overflow:hidden;">
              <div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:${c.text};opacity:.7;"></div>
              <span style="position:relative;font-size:7.5pt;font-weight:600;color:#1f2937;line-height:10pt;">${score!=null?Math.round(score)+'%':'—'}</span>
            </div>
          </td>
          <td style="text-align:center;">
            <span style="background:${c.bg};border:1pt solid ${c.border};color:${c.text};padding:1pt 6pt;border-radius:3pt;font-size:7.5pt;font-weight:600;">${c.label}</span>
          </td>
        </tr>`;
      }).join('');

      const vermelhos=DIMENSOES_INFO.filter(d=>resultado[`risco_${d.key}`]==='Vermelho');
      const amarelos=DIMENSOES_INFO.filter(d=>resultado[`risco_${d.key}`]==='Amarelo');

      pg.innerHTML=`
      ${phHeader(numSecao)}
      <div class="doc-section"><span class="num-secao">${numSecao}</span>Avaliação Psicossocial — Resultados por Função</div>

      <div style="background:#f0f4ff;border:1pt solid #c7d7f7;border-radius:4pt;padding:10pt;margin-bottom:12pt;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12pt;">
          <div>
            <div style="font-size:11pt;font-weight:700;color:#0d2040;">👷 ${h(funcao.nome_funcao)}</div>
            ${funcao.cbo?`<div style="font-size:8pt;color:#6b7280;margin-top:2pt;">CBO: ${h(funcao.cbo)}</div>`:''}
          </div>
          <div style="text-align:right;font-size:8pt;color:#6b7280;">
            <div>Campanha: ${h(campanha.titulo)}</div>
            <div>Encerrada em: ${dataFim}</div>
            <div>Respondentes: ${resultado.total_respondentes}</div>
          </div>
        </div>
      </div>

      <div class="doc-subsection">${numSecao}.${numSecao} Resultados por Dimensão</div>
      <table class="doc-table" style="margin-top:6pt;">
        <thead>
          <tr>
            <th style="width:35%;">Dimensão</th>
            <th style="width:15%;text-align:center;">Tipo</th>
            <th style="width:25%;text-align:center;">Score</th>
            <th style="width:25%;text-align:center;">Classificação</th>
          </tr>
        </thead>
        <tbody>${dimHtml}</tbody>
      </table>

      ${vermelhos.length||amarelos.length?`
      <div class="doc-subsection" style="margin-top:12pt;">Síntese e Encaminhamentos</div>
      <p class="doc-text">Com base nos resultados obtidos, identificou-se que a função <strong>${h(funcao.nome_funcao)}</strong> apresenta os seguintes fatores de risco psicossocial que requerem atenção:</p>
      ${vermelhos.length?`
      <p class="doc-text" style="margin-top:6pt;"><strong>Dimensões em alto risco (intervenção imediata):</strong> ${vermelhos.map(d=>d.nome).join(', ')}.</p>`:''}
      ${amarelos.length?`
      <p class="doc-text" style="margin-top:4pt;"><strong>Dimensões em risco moderado (implementar melhorias):</strong> ${amarelos.map(d=>d.nome).join(', ')}.</p>`:''}
      <p class="doc-text" style="margin-top:6pt;">Recomenda-se a implementação de medidas de controle organizacionais, incluindo revisão da organização do trabalho, programas de apoio psicossocial, capacitação de lideranças e acompanhamento periódico dos trabalhadores afetados. Os riscos psicossociais identificados foram inseridos no inventário de riscos desta função para rastreabilidade e controle.</p>
      `:`
      <div class="doc-subsection" style="margin-top:12pt;">Síntese</div>
      <p class="doc-text">A avaliação psicossocial da função <strong>${h(funcao.nome_funcao)}</strong> não identificou dimensões em risco elevado ou moderado. As condições psicossociais do trabalho encontram-se dentro de parâmetros adequados. Recomenda-se monitoramento periódico.</p>
      `}
      ${pfFooter(numSecao)}`;
      paginas.push(pg);
  });

  return paginas;
}


let acoesSelecionadasIds=null;

function renderPlanoAcao(){
  const pg=criarPagina();
  const todasAcoes=window.acoesData||[];
  const idsAtivos=acoesSelecionadasIds||todasAcoes.map(a=>a.id);
  const acoes=todasAcoes.filter(a=>idsAtivos.includes(a.id)&&a.status!=='Arquivada'&&a.status!=='Cancelada');
  const PRIOR_COR={'Crítica':'#991b1b','Alta':'#9a3412','Média':'#854d0e','Baixa':'#166534'};
  const PRIOR_BG={'Crítica':'#fee2e2','Alta':'#ffedd5','Média':'#fef9c3','Baixa':'#dcfce7'};
  const setoresMap={};setores.forEach(s=>{setoresMap[s.id]=s.nome_setor;});
  const funcoesMap={};funcoes.forEach(f=>{funcoesMap[f.id]=f.nome_funcao;});

  // Agrupa ações por título (Opção A — deduplicação na renderização)
  const acoesAgrupadas=[];
  const titlosVistos={};
  acoes.forEach(a=>{
    const titulo=a.titulo.trim();
    if(titlosVistos[titulo]!==undefined){
      // Adiciona vínculo ao grupo existente
      const grupo=acoesAgrupadas[titlosVistos[titulo]];
      const setor=a.setor_id?setoresMap[a.setor_id]:null;
      const funcao=a.funcao_id?funcoesMap[a.funcao_id]:null;
      if(setor&&!grupo.vinculos.includes('📁 '+setor))grupo.vinculos.push('📁 '+setor);
      if(funcao&&!grupo.vinculos.includes('👷 '+funcao))grupo.vinculos.push('👷 '+funcao);
      // Mantém a prioridade mais alta
      const priorOrdem={Crítica:4,Alta:3,Média:2,Baixa:1};
      if((priorOrdem[a.prioridade]||0)>(priorOrdem[grupo.prioridade]||0))grupo.prioridade=a.prioridade;
      // Mantém o prazo mais próximo
      if(a.prazo&&(!grupo.prazo||a.prazo<grupo.prazo))grupo.prazo=a.prazo;
    }else{
      titlosVistos[titulo]=acoesAgrupadas.length;
      const setor=a.setor_id?setoresMap[a.setor_id]:null;
      const funcao=a.funcao_id?funcoesMap[a.funcao_id]:null;
      const vinculos=[];
      if(setor)vinculos.push('📁 '+setor);
      if(funcao)vinculos.push('👷 '+funcao);
      acoesAgrupadas.push({titulo,origem:a.origem,prioridade:a.prioridade,responsavel:a.responsavel,prazo:a.prazo,status:a.status,vinculos});
    }
  });

  pg.innerHTML=`
  ${phHeader()}
  <div class="doc-section"><span class="num-secao">6</span>Plano de Ação</div>
  <p class="doc-text" style="margin-bottom:12pt;">O Plano de Ação estabelece as medidas de prevenção e controle a implementar, com responsáveis, prazos e status, seguindo a hierarquia da NR-1.</p>
  ${!acoesAgrupadas.length?`<div class="em-breve"><div class="em-breve-icon">📋</div><div class="em-breve-label">Nenhuma ação selecionada.<br>Clique em "Revisar plano de ação" para selecionar.</div></div>`:`
  <table class="doc-table">
    <thead><tr><th style="width:35%;">Ação</th><th style="width:12%;">Origem</th><th style="width:10%;text-align:center;">Prioridade</th><th style="width:15%;">Responsável</th><th style="width:13%;text-align:center;">Prazo</th><th style="width:15%;text-align:center;">Status</th></tr></thead>
    <tbody>${acoesAgrupadas.map(a=>{
      const prior=a.prioridade||'Média';
      const prazo=a.prazo?fmtData(a.prazo):'—';
      return`<tr>
        <td>
          <div style="font-weight:500;font-size:9pt;">${h(a.titulo)}</div>
          ${a.vinculos.length?`<div style="font-size:7pt;color:#9ca3af;margin-top:2pt;">${a.vinculos.map(v=>h(v)).join(' · ')}</div>`:''}
        </td>
        <td style="font-size:8pt;">${h(a.origem||'Manual')}</td>
        <td style="text-align:center;"><span style="background:${PRIOR_BG[prior]||'#f3f4f6'};color:${PRIOR_COR[prior]||'#374151'};padding:2pt 6pt;border-radius:3pt;font-size:7.5pt;font-weight:600;">${h(prior)}</span></td>
        <td style="font-size:8pt;">${h(a.responsavel||'—')}</td>
        <td style="text-align:center;font-size:8pt;font-family:'IBM Plex Mono',monospace;">${prazo}</td>
        <td style="text-align:center;font-size:7.5pt;font-weight:500;">${h(a.status||'Pendente')}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`}
  <div class="doc-subsection" style="margin-top:16pt;">Monitoramento e Revisão — NR-1</div>
  <p class="doc-text">Este PGR deverá ser revisado: <strong>anualmente</strong> (revisão periódica obrigatória); após <strong>mudanças nos processos</strong> que alterem os riscos; após <strong>acidente grave, fatal</strong> ou diagnóstico de doença ocupacional; quando houver <strong>novos agentes de risco</strong>; quando solicitado por <strong>Auditor Fiscal do Trabalho</strong>.</p>
  <div style="margin-top:30pt;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20pt;">
    ${['Elaborado por','Revisado por','Aprovado por'].map(l=>`<div style="text-align:center;">
      <div style="border-top:1pt solid #374151;padding-top:6pt;margin-top:40pt;">
        <div style="font-size:8pt;color:#6b7280;">${l}</div>
        <div style="font-size:8pt;color:#9ca3af;margin-top:2pt;">Data: ___/___/______</div>
      </div>
    </div>`).join('')}
  </div>
  ${pfFooter()}`;
  return pg;
}

function criarPagina(){const pg=document.createElement('div');pg.className='page';return pg;}
function phHeader(){return`<div class="page-header"><span class="ph-empresa">${h(empresa?.nome_fantasia||empresa?.razao_social||'')}</span><span class="ph-doc">PGR — ${fmtAno()}</span></div>`;}
function pfFooter(){return`<div class="page-footer"><span class="pf-label">Programa de Gerenciamento de Riscos — ${h(empresa?.nome_fantasia||empresa?.razao_social||'')}</span><span class="pf-page"></span></div>`;}

// ── ELABORADORA ───────────────────────────────────────────────
let elaboradora={nome:'',cnpj:'',responsavel:'',logoUrl:''};
function toggleElaboradora(){const p=document.getElementById('painel-elaboradora');p.style.display=p.style.display==='none'?'block':'none';}
function carregarLogo(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{elaboradora.logoUrl=e.target.result;
    document.getElementById('logo-preview').innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:contain;">`;
    document.getElementById('btn-remover-logo').style.display='block';
    atualizarElaboradora();};
  reader.readAsDataURL(file);
}
function removerLogo(){
  elaboradora.logoUrl='';
  document.getElementById('logo-preview').innerHTML='📷<br>Logo';
  document.getElementById('btn-remover-logo').style.display='none';
  document.getElementById('elab-logo-input').value='';
  atualizarElaboradora();
}
function atualizarElaboradora(){
  elaboradora.nome=document.getElementById('elab-nome').value.trim();
  elaboradora.cnpj=document.getElementById('elab-cnpj').value.trim();
  elaboradora.responsavel=document.getElementById('elab-responsavel').value.trim();

  const temElaboradora=!!(elaboradora.nome||elaboradora.logoUrl);
  const elabWrap=document.getElementById('capa-elab-wrap');
  const elabFallback=document.getElementById('capa-elab-fallback');

  if(elabWrap)elabWrap.style.display=temElaboradora?'flex':'none';
  if(elabFallback)elabFallback.style.display=temElaboradora?'none':'block';

  // Atualiza nome da elaboradora no lado direito da capa
  const nomeDir=document.getElementById('doc-elab-nome-dir');
  if(nomeDir)nomeDir.textContent=elaboradora.nome||'Empresa Elaboradora';

  // Atualiza logo da elaboradora
  const logoEl=document.getElementById('doc-elab-logo');
  if(logoEl){
    if(elaboradora.logoUrl){
      logoEl.innerHTML=`<img src="${elaboradora.logoUrl}" style="width:100%;height:100%;object-fit:contain;border-radius:4pt;">`;
      logoEl.style.cssText='background:#fff;padding:4pt;';
    }else{
      const sigla=(elaboradora.nome||'SST').replace(/[^A-Z]/gi,'').slice(0,3).toUpperCase()||'SST';
      logoEl.innerHTML=`<span class="capa-logo-text-sm">${sigla}</span>`;
      logoEl.style.cssText='';
    }
  }

  // Atualiza rodapé de elaboração
  const footerEl=document.getElementById('doc-elab-footer');
  if(footerEl)footerEl.textContent=elaboradora.responsavel||elaboradora.nome||'—';
}

// ── PLANO DE AÇÃO MODAL ───────────────────────────────────────
function abrirModalPlanoAcao(){
  const acoes=window.acoesData||[];
  if(!acoes.length){alert('Nenhuma ação cadastrada.');return;}
  const PRIOR_COR={'Crítica':'#e05555','Alta':'#e0a855','Média':'#7aabf7','Baixa':'#2dd4a0'};
  const STATUS_COR={'Pendente':'#545e72','Em andamento':'#4a7cdc','Concluída':'#2dd4a0','Atrasada':'#e05555'};
  const grupos={'Crítica':[],'Alta':[],'Média':[],'Baixa':[]};
  acoes.filter(a=>a.status!=='Arquivada'&&a.status!=='Cancelada').forEach(a=>{
    (grupos[a.prioridade]||grupos['Média']).push(a);
  });
  const ids=acoesSelecionadasIds||acoes.map(a=>a.id);
  document.getElementById('lista-plano-acoes').innerHTML=Object.entries(grupos).map(([prioridade,items])=>{
    if(!items.length)return'';
    return`<div style="margin-bottom:14px;">
      <div style="font-size:11px;font-weight:600;color:${PRIOR_COR[prioridade]||'var(--text2)'};text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">${prioridade} (${items.length})</div>
      ${items.map(a=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <input type="checkbox" id="plano-acao-${a.id}" ${ids.includes(a.id)?'checked':''} onchange="atualizarCountPlano()" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin-top:2px;flex-shrink:0;">
        <label for="plano-acao-${a.id}" style="flex:1;cursor:pointer;">
          <div style="font-size:13px;font-weight:500;color:var(--text);">${h(a.titulo)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;">
            <span style="color:${STATUS_COR[a.status]||'var(--text3)'};">● ${h(a.status||'Pendente')}</span>
            <span>📋 ${h(a.origem||'Manual')}</span>
            ${a.responsavel?`<span>👤 ${h(a.responsavel)}</span>`:''}
            ${a.prazo?`<span>📅 ${fmtData(a.prazo)}</span>`:''}
          </div>
        </label>
      </div>`).join('')}
    </div>`;
  }).join('');
  atualizarCountPlano();
  document.getElementById('modal-plano').style.display='flex';
}
function atualizarCountPlano(){
  const acoes=window.acoesData||[];
  const total=acoes.filter(a=>a.status!=='Arquivada'&&a.status!=='Cancelada').length;
  const sel=acoes.filter(a=>document.getElementById(`plano-acao-${a.id}`)?.checked).length;
  document.getElementById('plano-count').textContent=`${sel} de ${total} selecionada(s)`;
  document.getElementById('plano-check-all').checked=sel===total;
}
function toggleTodasAcoes(checked){
  (window.acoesData||[]).forEach(a=>{const el=document.getElementById(`plano-acao-${a.id}`);if(el)el.checked=checked;});
  atualizarCountPlano();
}
function fecharModalPlanoAcao(){document.getElementById('modal-plano').style.display='none';}
function aplicarSelecaoPlano(){
  const acoes=window.acoesData||[];
  acoesSelecionadasIds=acoes.filter(a=>document.getElementById(`plano-acao-${a.id}`)?.checked).map(a=>a.id);
  fecharModalPlanoAcao();
  const wrap=document.getElementById('pages-wrap');
  const pages=wrap.querySelectorAll('.page');
  const ultima=pages[pages.length-1];
  wrap.replaceChild(renderPlanoAcao(),ultima);
}

carregar();
</script>
