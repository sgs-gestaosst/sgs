<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGS — Cadastro de Empresa</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3044;--border-focus:#4a7cdc;
    --accent:#4a7cdc;--accent2:#2dd4a0;--text:#e8eaf0;--text2:#8892a4;--text3:#545e72;
    --danger:#e05555;--warning:#e0a855;--success:#2dd4a0;
    --gr1:#2dd4a0;--gr2:#7aabf7;--gr3:#e0a855;--gr4:#e05555;
    --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  .header-logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.08em;border:1px solid var(--border-focus);padding:4px 10px;border-radius:var(--radius);}
  .header-title{font-size:13px;color:var(--text2);}
  .header-title span{color:var(--text);font-weight:500;}
  .container{max-width:960px;margin:0 auto;padding:32px 24px 80px;}
  .cnpj-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:24px;}
  .section-label{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .cnpj-row{display:flex;gap:12px;align-items:flex-end;}
  .cnpj-row .field{flex:1;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
  .field label .req{color:var(--accent);margin-left:2px;}
  input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 14px;outline:none;transition:border-color .15s,background .15s;appearance:none;}
  input:focus,select:focus{border-color:var(--border-focus);background:#141824;}
  input::placeholder{color:var(--text3);}
  input.filled{border-color:var(--border-focus);color:var(--accent2);}
  select option{background:var(--surface2);}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#5a8ce8;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--border-focus);}
  .btn-success{background:var(--accent2);color:#0f1117;font-weight:600;}
  .btn-success:hover{background:#3de8b4;}
  .btn-success:disabled{opacity:.4;cursor:not-allowed;}
  .status-bar{display:none;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:12px;}
  .status-bar.show{display:flex;}
  .status-bar.info{background:#1a2540;border:1px solid #2a4070;color:#7aabf7;}
  .status-bar.success{background:#0e2820;border:1px solid #1a4a38;color:var(--success);}
  .status-bar.error{background:#2a1515;border:1px solid #4a2020;color:var(--danger);}
  .status-bar.warning{background:#2a2010;border:1px solid #4a3a10;color:var(--warning);}
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:16px;opacity:.4;pointer-events:none;transition:opacity .3s;}
  .form-card.active{opacity:1;pointer-events:all;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .toggle-field{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);}
  .toggle-label{font-size:13px;color:var(--text);}
  .toggle{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .toggle.on{background:var(--accent2);}
  .toggle::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;}
  .toggle.on::after{left:21px;}
  .cnae-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .cnae-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;}
  .cnae-badge{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;white-space:nowrap;}
  .cnae-badge.principal{background:#1a2e50;color:#7aabf7;border:1px solid #2a4a80;}
  .cnae-badge.secundario{background:#1e2333;color:var(--text2);border:1px solid var(--border);}
  .cnae-code{font-family:var(--mono);font-size:12px;color:var(--accent2);white-space:nowrap;}
  .cnae-desc{color:var(--text2);flex:1;}
  .cnae-gr{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:4px;white-space:nowrap;font-weight:500;}
  .gr1{background:#0e2820;color:var(--gr1);border:1px solid #1a4a38;}
  .gr2{background:#1a2540;color:var(--gr2);border:1px solid #2a4070;}
  .gr3{background:#2a2010;color:var(--gr3);border:1px solid #4a3a10;}
  .gr4{background:#2a1515;color:var(--gr4);border:1px solid #4a2020;}
  .gr-box{display:flex;gap:16px;align-items:center;padding:16px 18px;background:var(--bg);border:2px solid var(--border);border-radius:10px;margin-bottom:8px;transition:border-color .3s;}
  .gr-num{width:64px;height:64px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:28px;font-weight:500;flex-shrink:0;}
  .gr-text strong{font-size:15px;font-weight:500;display:block;margin-bottom:4px;}
  .gr-text small{font-size:11px;color:var(--text3);display:block;}
  .gr-text .gr-cnae{font-family:var(--mono);font-size:12px;margin-top:2px;display:block;}
  .actions-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:24px;}
  .actions-bar .spacer{flex:1;}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
  .spinner.show{display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hint{font-size:11px;color:var(--text3);margin-top:4px;}
  @media(max-width:600px){.header-title{display:none;}.user-email{display:none;}.grid-2,.grid-3{grid-template-columns:1fr;}.cnpj-row{flex-direction:column;}.header{padding:12px 16px;}.container{padding:16px 12px 60px;}}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="header-logo" style="text-decoration:none;">SGS</a>
  <div class="header-title">Sistema de Gestão em SST &nbsp;/&nbsp; <span>Cadastro de Empresa</span></div>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
  <a href="empresas.html" style="font-size:12px;color:var(--text2);text-decoration:none;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);">← Voltar</a>
  
</div>
<div class="container">

  <div class="cnpj-section">
    <div class="section-label">Consulta CNPJ</div>
    <div class="cnpj-row">
      <div class="field">
        <label>CNPJ <span class="req">*</span></label>
        <input type="text" id="cnpj-input" placeholder="00.000.000/0000-00" maxlength="18">
      </div>
      <div style="margin-bottom:16px;">
        <button class="btn btn-primary" id="btn-buscar" onclick="buscarCNPJ()">
          <span class="spinner" id="spinner-busca"></span>
          <span id="btn-buscar-label">Buscar</span>
        </button>
      </div>
      <div style="margin-bottom:16px;">
        <button class="btn btn-secondary" onclick="limparTudo()">Limpar</button>
      </div>
    </div>
    <div class="status-bar" id="status-busca"></div>
  </div>

  <div class="form-card" id="card-dados">
    <div class="section-label">Dados da Empresa</div>
    <div class="field"><label>Razão Social <span class="req">*</span></label><input type="text" id="razao_social" placeholder="Nome empresarial completo"></div>
    <div class="grid-2">
      <div class="field"><label>Nome Fantasia</label><input type="text" id="nome_fantasia" placeholder="Nome de fantasia"></div>
      <div class="field"><label>Natureza Jurídica</label><input type="text" id="natureza_juridica" placeholder="Ex: Sociedade Empresária Limitada"></div>
    </div>
    <div class="grid-3">
      <div class="field"><label>Porte</label>
        <select id="porte"><option value="">Selecione</option><option value="MEI">MEI</option><option value="ME">Micro Empresa</option><option value="EPP">Pequeno Porte</option><option value="MEDIO">Médio Porte</option><option value="GRANDE">Grande Porte</option></select>
      </div>
      <div class="field"><label>Situação Cadastral</label><input type="text" id="situacao" placeholder="Ex: ATIVA"></div>
      <div class="field"><label>Data de Abertura</label><input type="text" id="data_abertura" placeholder="DD/MM/AAAA"></div>
    </div>
  </div>

  <div class="form-card" id="card-contato">
    <div class="section-label">Contato</div>
    <div class="grid-2">
      <div class="field"><label>E-mail</label><input type="email" id="email" placeholder="contato@empresa.com.br"></div>
      <div class="field"><label>Telefone</label><input type="text" id="telefone" placeholder="(00) 00000-0000"></div>
    </div>
  </div>

  <div class="form-card" id="card-endereco">
    <div class="section-label">Endereço</div>
    <div class="field"><label>Logradouro</label><input type="text" id="endereco" placeholder="Rua, Avenida, Rodovia..."></div>
    <div class="grid-3">
      <div class="field"><label>Cidade</label><input type="text" id="cidade" placeholder="Município"></div>
      <div class="field"><label>Estado</label>
        <select id="estado"><option value="">UF</option><option>AC</option><option>AL</option><option>AP</option><option>AM</option><option>BA</option><option>CE</option><option>DF</option><option>ES</option><option>GO</option><option>MA</option><option>MT</option><option>MS</option><option>MG</option><option>PA</option><option>PB</option><option>PR</option><option>PE</option><option>PI</option><option>RJ</option><option>RN</option><option>RS</option><option>RO</option><option>RR</option><option>SC</option><option>SP</option><option>SE</option><option>TO</option></select>
      </div>
      <div class="field"><label>CEP</label><input type="text" id="cep" placeholder="00000-000" maxlength="9"></div>
    </div>
  </div>

  <div class="form-card" id="card-sst">
    <div class="section-label">Dados SST</div>
    <div class="grid-2">
      <div class="field">
        <label>Grau de Risco — NR-4 <span class="req">*</span></label>
        <div id="gr-box" class="gr-box" style="display:none;">
          <div class="gr-num" id="gr-num">—</div>
          <div class="gr-text">
            <strong id="gr-titulo">—</strong>
            <small id="gr-fonte">—</small>
          </div>
        </div>
        <select id="grau_risco" onchange="grManual()">
          <option value="">Calculado automaticamente pelo CNAE</option>
          <option value="1">GR 1 — Baixo</option>
          <option value="2">GR 2 — Médio-Baixo</option>
          <option value="3">GR 3 — Médio-Alto</option>
          <option value="4">GR 4 — Alto</option>
        </select>
        <div class="hint" id="gr-hint">Preenchido automaticamente pela tabela NR-4 após busca do CNPJ.</div>
      </div>
      <div class="field"><label>Nº de Funcionários <span class="req">*</span></label><input type="number" id="total_funcionarios" placeholder="0" min="0" oninput="verificarLimiteInput()"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Atividade Rural</label>
        <div class="toggle-field"><span class="toggle-label">Empresa de atividade rural?</span><div class="toggle" id="toggle-rural" onclick="toggleRural()"></div></div>
      </div>
      <div class="field"><label>Ativa no sistema</label>
        <div class="toggle-field"><span class="toggle-label">Empresa ativa no SGS?</span><div class="toggle on" id="toggle-ativo" onclick="toggleAtivo()"></div></div>
      </div>
    </div>
  </div>

  <div class="form-card" id="card-cnaes">
    <div class="section-label">CNAEs</div>
    <div id="cnae-list" class="cnae-list">
      <div style="color:var(--text3);font-size:13px;padding:12px 0;">CNAEs serão carregados após a consulta do CNPJ.</div>
    </div>
  </div>

  <div class="actions-bar" id="actions-bar" style="opacity:.3;pointer-events:none;">
    <button class="btn btn-success" id="btn-salvar" onclick="salvarEmpresa()">
      <span class="spinner" id="spinner-salvar"></span>
      <span id="btn-salvar-label">Salvar no Sistema</span>
    </button>
    <div class="spacer"></div>
    <button class="btn btn-secondary" onclick="limparTudo()">Cancelar</button>
  </div>
  <div class="status-bar" id="status-salvar"></div>

</div>
<script>
// =====================================================
// SUPABASE + AUTENTICAÇÃO
// =====================================================
const SUPA_URL = 'https://ookqdukeulwcnhilbgbo.supabase.co';
const SUPA_KEY = 'sb_publishable_l9NggU-e1bgt7CnrYUWo4w_AMoaJa2e';

// Verifica se está logado
const sgs_token = localStorage.getItem('sgs_token');
const sgs_user = localStorage.getItem('sgs_user') ? JSON.parse(localStorage.getItem('sgs_user')) : null;
if (!sgs_token) { window.location.href = 'login.html'; }
let _temDuplicata = false;

// Verifica se está cadastrando uma filial
const _urlParams = new URLSearchParams(window.location.search);
const _maeId = _urlParams.get('mae_id') ? parseInt(_urlParams.get('mae_id')) : null;

// Se for filial, mostra aviso no topo
if (_maeId) {
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/empresas?id=eq.${_maeId}&select=razao_social,nome_fantasia`, {
        headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${sgs_token}`}
      });
      const data = await res.json();
      if (data.length) {
        const nomeMae = data[0].nome_fantasia || data[0].razao_social;
        const aviso = document.createElement('div');
        aviso.style.cssText = 'background:#1a2540;border:1px solid #2a4070;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:#7aabf7;display:flex;align-items:center;gap:10px;';
        aviso.innerHTML = `<span>↳</span><span>Cadastrando filial de <strong style="color:#e8eaf0;">${nomeMae}</strong> — o vínculo será feito automaticamente.</span>`;
        const container = document.querySelector('.container') || document.querySelector('form') || document.body;
        container.insertBefore(aviso, container.firstChild);
      }
    } catch(e) { console.log(e); }
  });
}

async function salvarNoSupabase(empresa, cnaes) {
  const resEmpresa = await fetch(`${SUPA_URL}/rest/v1/empresas`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${sgs_token}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(empresa)
  });
  if (!resEmpresa.ok) {
    const err = await resEmpresa.json();
    throw new Error(err.message || 'Erro ao salvar empresa');
  }
  const salva = await resEmpresa.json();
  const empresaId = salva[0].id;

  for (const c of cnaes) {
    await fetch(`${SUPA_URL}/rest/v1/empresa_cnaes`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${sgs_token}`
      },
      body: JSON.stringify({ ...c, empresa_id: empresaId })
    });
  }
  return empresaId;
}

const GR_INFO={
  1:{label:"GR 1 — Risco Baixo",hex:"#2dd4a0",bg:"#0e282022",border:"#1a4a3855",cls:"gr1"},
  2:{label:"GR 2 — Risco Médio-Baixo",hex:"#7aabf7",bg:"#1a254022",border:"#2a407055",cls:"gr2"},
  3:{label:"GR 3 — Risco Médio-Alto",hex:"#e0a855",bg:"#2a201022",border:"#4a3a1055",cls:"gr3"},
  4:{label:"GR 4 — Risco Alto",hex:"#e05555",bg:"#2a151522",border:"#4a202055",cls:"gr4"}
};

function normCNAE(cnae){const d=cnae.replace(/\D/g,'').padStart(7,'0');if(d.length>=5)return d.slice(0,4)+'-'+d.slice(4,5);return null;}
function buscarGR(cnae){const k=normCNAE(cnae);return k?NR4[k]||null:null;}

function mostrarGR(gr,cnae,fonte){
  const info=GR_INFO[gr];if(!info)return;
  const box=document.getElementById('gr-box');
  const num=document.getElementById('gr-num');
  num.textContent=gr;num.className='gr-num '+info.cls;
  num.style.cssText=`background:${info.bg};border:1px solid ${info.border};color:${info.hex};`;
  document.getElementById('gr-titulo').textContent=info.label;
  document.getElementById('gr-fonte').textContent=fonte;
  document.getElementById('gr-box').style.borderColor=info.hex+'88';
  box.style.display='flex';
  document.getElementById('grau_risco').value=gr;
  document.getElementById('gr-hint').textContent='Calculado automaticamente. Ajuste manualmente se necessário.';
}

let cnaes=[],rural=false,ativo=true;

document.getElementById('cnpj-input').addEventListener('input',function(e){
  let v=e.target.value.replace(/\D/g,'');
  if(v.length>14)v=v.slice(0,14);
  if(v.length>12)v=v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8,12)+'-'+v.slice(12);
  else if(v.length>8)v=v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8);
  else if(v.length>5)v=v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5);
  else if(v.length>2)v=v.slice(0,2)+'.'+v.slice(2);
  e.target.value=v;
});
document.getElementById('cnpj-input').addEventListener('keydown',e=>{if(e.key==='Enter')buscarCNPJ();});
document.getElementById('cep').addEventListener('input',function(e){
  let v=e.target.value.replace(/\D/g,'').slice(0,8);
  if(v.length>5)v=v.slice(0,5)+'-'+v.slice(5);
  e.target.value=v;
});

function setStatus(id,t,m){const b=document.getElementById(id);b.className='status-bar show '+t;const i={info:'↻',success:'✓',error:'✕',warning:'⚠'};b.innerHTML=`<span>${i[t]}</span><span>${m}</span>`;}
function ativar(){['card-dados','card-contato','card-endereco','card-sst','card-cnaes'].forEach(id=>document.getElementById(id).classList.add('active'));const a=document.getElementById('actions-bar');a.style.opacity='1';a.style.pointerEvents='all';}
function set(id,v){const el=document.getElementById(id);if(!el||!v||!v.toString().trim())return;el.value=v;if(el.tagName==='INPUT')el.classList.add('filled');}
function fmtTel(r){const d=r.replace(/\D/g,'');if(d.length===10)return`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;if(d.length===11)return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;return r;}
function fmtCEP(r){if(!r)return'';const d=r.replace(/\D/g,'');return d.length===8?`${d.slice(0,5)}-${d.slice(5)}`:r;}
function fmtCNAE(r){const d=r.replace(/\D/g,'').padStart(7,'0');return`${d.slice(0,4)}-${d.slice(4,5)}/${d.slice(5)}`;}

async function buscarCNPJ(){
  const raw=document.getElementById('cnpj-input').value.replace(/\D/g,'');
  if(raw.length!==14){setStatus('status-busca','error','CNPJ inválido — verifique os 14 dígitos.');return;}
  document.getElementById('spinner-busca').className='spinner show';
  document.getElementById('btn-buscar-label').textContent='Buscando...';
  document.getElementById('btn-buscar').disabled=true;
  setStatus('status-busca','info','Consultando BrasilAPI...');
  try{
    const res=await fetch(`https://brasilapi.com.br/api/cnpj/v1/${raw}`);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`CNPJ não encontrado (${res.status})`);}
    const d=await res.json();
    set('razao_social',d.razao_social);
    set('nome_fantasia',d.nome_fantasia||d.razao_social);
    set('natureza_juridica',d.natureza_juridica);
    set('situacao',d.descricao_situacao_cadastral);
    set('email',d.email);
    set('telefone',d.ddd_telefone_1?fmtTel(d.ddd_telefone_1):'');
    const pm={'MEI':'MEI','MICRO EMPRESA':'ME','EMPRESA DE PEQUENO PORTE':'EPP','DEMAIS':'MEDIO'};
    const pk=Object.keys(pm).find(k=>(d.porte||'').toUpperCase().includes(k));
    if(pk)document.getElementById('porte').value=pm[pk];
    if(d.data_inicio_atividade){const[y,m,dd]=d.data_inicio_atividade.split('-');set('data_abertura',`${dd}/${m}/${y}`);}
    const log=[d.descricao_tipo_de_logradouro,d.logradouro,d.numero].filter(Boolean).join(' ');
    set('endereco',log);set('cidade',d.municipio);set('cep',fmtCEP(d.cep));
    if(d.uf)document.getElementById('estado').value=d.uf;
    const pw=['rural','carvao','carvão','madeira','florestal','agricultura','pecuaria','pecuária','pesca','plantio','silvicultura'];
    if(pw.some(w=>(d.cnae_fiscal_descricao||'').toLowerCase().includes(w))){rural=true;document.getElementById('toggle-rural').classList.add('on');}
    cnaes=[];
    if(d.cnae_fiscal&&d.cnae_fiscal_descricao){
      const gr=buscarGR(d.cnae_fiscal.toString());
      cnaes.push({cnae:fmtCNAE(d.cnae_fiscal.toString()),descricao:d.cnae_fiscal_descricao,tipo:'Principal',gr});
    }
    if(d.cnaes_secundarios){d.cnaes_secundarios.forEach(c=>{const gr=buscarGR(c.codigo.toString());cnaes.push({cnae:fmtCNAE(c.codigo.toString()),descricao:c.descricao,tipo:'Secundario',gr});});}
    renderCNAEs();
    const p=cnaes.find(c=>c.tipo==='Principal');
    if(p&&p.gr)mostrarGR(p.gr,p.cnae,'Tabela NR-4 Quadro I');
    else document.getElementById('gr-hint').textContent='CNAE não localizado na tabela NR-4. Selecione manualmente.';
    ativar();
    setStatus('status-busca','success',`Empresa encontrada — ${d.razao_social}`);

    // Verifica se CNPJ já está cadastrado
    try {
      const resExiste = await fetch(
        `${SUPA_URL}/rest/v1/empresas?cnpj_raiz=eq.${raw.slice(0,8)}&ativo=eq.true&user_id=eq.${sgs_user?.id}&select=id,razao_social,nome_fantasia`,
        { headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${sgs_token}`} }
      );
      const jaExiste = await resExiste.json();
      if (jaExiste.length > 0 && !_maeId) {
        const emp = jaExiste[0];
        const nomeEmp = emp.nome_fantasia || emp.razao_social;
        const avisoExiste = document.getElementById('aviso-existe');
        if (avisoExiste) avisoExiste.remove();
        const aviso = document.createElement('div');
        _temDuplicata = true;
        aviso.id = 'aviso-existe';
        aviso.style.cssText = 'background:#2a1515;border:1px solid #4a2020;border-radius:10px;padding:16px 18px;margin-top:12px;';
        aviso.innerHTML = `
          <div style="font-size:13px;color:#e05555;margin-bottom:12px;">
            ⚠️ <strong style="color:#e8eaf0;">${nomeEmp}</strong> já está cadastrada no sistema.<br>
            <span style="font-size:12px;color:#8892a4;margin-top:4px;display:block;">Verifique se não está tentando cadastrar uma empresa duplicada.</span>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <a href="empresa_detalhe.html?id=${emp.id}" style="padding:8px 16px;background:#4a7cdc;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;text-decoration:none;display:inline-block;">
              Ver cadastro existente
            </a>
          </div>`;
        const statusBusca = document.getElementById('status-busca');
        statusBusca.parentNode.insertBefore(aviso, statusBusca.nextSibling);
      }
    } catch(e) { console.log('Erro ao verificar duplicata:', e); }

    // Verifica se o CNPJ raiz já existe no banco (possível filial)
    if (!_maeId) {
      const cnpjRaiz = raw.slice(0,8);
      try {
        const resGrupo = await fetch(
          `${SUPA_URL}/rest/v1/empresas?cnpj_raiz=eq.${cnpjRaiz}&select=id,razao_social,nome_fantasia,tipo_empresa`,
          { headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${sgs_token}`} }
        );
        const grupo = await resGrupo.json();
        const matrizes = grupo.filter(e => (!e.empresa_mae_id || e.tipo_empresa === 'MATRIZ') && e.id !== parseInt(_maeId));
        // Verifica se não é a própria empresa sendo cadastrada de novo
        const cnpjCompleto = raw;
        const mesmoCNPJCompleto = grupo.find(e => e.cnpj_raiz === cnpjCompleto.slice(0,8) && e.user_id === sgs_user?.id);
        // Só mostra aviso de filial se NÃO houver duplicata já cadastrada
        const temDuplicata = document.getElementById('aviso-existe') !== null;
        if (matrizes.length > 0 && !mesmoCNPJCompleto && !temDuplicata) {
          const mae = matrizes[0];
          const nomeMae = mae.nome_fantasia || mae.razao_social;
          // Remove aviso anterior se houver
          const avisoAnterior = document.getElementById('aviso-grupo');
          if (avisoAnterior) avisoAnterior.remove();
          // Cria aviso
          const aviso = document.createElement('div');
          aviso.id = 'aviso-grupo';
          aviso.style.cssText = 'background:#2a2010;border:1px solid #4a3a10;border-radius:10px;padding:16px 18px;margin-top:12px;';
          aviso.innerHTML = `
            <div style="font-size:13px;color:#e0a855;margin-bottom:12px;">
              ⚠️ Este CNPJ pertence ao grupo <strong style="color:#e8eaf0;">${nomeMae}</strong>.<br>
              <span style="font-size:12px;color:#8892a4;margin-top:4px;display:block;">Deseja cadastrar como filial desta empresa?</span>
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="vincularFilial(${mae.id})" style="padding:8px 16px;background:#4a7cdc;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;">
                Sim, cadastrar como filial
              </button>
              <button onclick="fecharAvisoGrupo()" style="padding:8px 16px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;">
                Não, cadastrar independente
              </button>
            </div>`;
          const statusBusca = document.getElementById('status-busca');
          statusBusca.parentNode.insertBefore(aviso, statusBusca.nextSibling);
        }
      } catch(e) { console.log('Erro ao verificar grupo:', e); }
    }
  }catch(e){setStatus('status-busca','error',`Erro: ${e.message}`);}
  finally{
    document.getElementById('spinner-busca').className='spinner';
    document.getElementById('btn-buscar-label').textContent='Buscar';
    document.getElementById('btn-buscar').disabled=false;
  }
}

function verificarLimiteInput() {
  const aviso = document.getElementById('aviso-limite');
  if (aviso) {
    aviso.remove();
    document.getElementById('btn-salvar').disabled = false;
    document.getElementById('btn-salvar-label').textContent = 'Salvar no Sistema';
  }
}

function fecharAvisoGrupo() {
  const el = document.getElementById('aviso-grupo');
  if (el) el.remove();
}

function fecharAvisoExiste() {
  const el = document.getElementById('aviso-existe');
  if (el) el.remove();
  _temDuplicata = false;
}

function vincularFilial(maeId) {
  // Remove aviso e define o mae_id para o salvamento
  const aviso = document.getElementById('aviso-grupo');
  if (aviso) {
    aviso.style.background = '#0e2820';
    aviso.style.border = '1px solid #1a4a38';
    aviso.innerHTML = `<div style="font-size:13px;color:#2dd4a0;">✓ Será cadastrada como filial. O vínculo será feito automaticamente ao salvar.</div>`;
  }
  window._maeIdDinamico = maeId;
}

function grManual(){const gr=parseInt(document.getElementById('grau_risco').value);if(gr)mostrarGR(gr,'—','Definido manualmente');}

function renderCNAEs(){
  const l=document.getElementById('cnae-list');
  if(!cnaes.length){l.innerHTML='<div style="color:var(--text3);font-size:13px;padding:12px 0;">Nenhum CNAE encontrado.</div>';return;}
  l.innerHTML=cnaes.map(c=>{
    const g=c.gr?`<span class="cnae-gr ${GR_INFO[c.gr].cls}">GR ${c.gr}</span>`:`<span class="cnae-gr" style="color:var(--text3)">—</span>`;
    return`<div class="cnae-item"><span class="cnae-badge ${c.tipo==='Principal'?'principal':'secundario'}">${c.tipo}</span><span class="cnae-code">${c.cnae}</span><span class="cnae-desc">${c.descricao}</span>${g}</div>`;
  }).join('');
}

function toggleRural(){rural=!rural;document.getElementById('toggle-rural').classList.toggle('on',rural);}
function toggleAtivo(){ativo=!ativo;document.getElementById('toggle-ativo').classList.toggle('on',ativo);}

async function salvarEmpresa(){
  if (_temDuplicata) {
    setStatus('status-salvar','error','Esta empresa já está cadastrada. Clique em "Ver cadastro existente" ou limpe o formulário.');
    return;
  }
  const razao=document.getElementById('razao_social').value;
  if(!razao){setStatus('status-salvar','error','Preencha pelo menos a Razão Social.');return;}
  const raw=document.getElementById('cnpj-input').value.replace(/\D/g,'');
  const gr=parseInt(document.getElementById('grau_risco').value)||null;
  const fn=document.getElementById('total_funcionarios').value;

  // Valida limite de funcionários ANTES de mostrar salvando
  if (fn) {
    const numFuncs = parseInt(fn);
    try {
      // Busca assinatura ativa do usuário com o plano vinculado
      const resAssin = await fetch(
        `${SUPA_URL}/rest/v1/assinaturas?user_id=eq.${sgs_user?.id}&ativo=eq.true&select=status,plano_id`,
        { headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${sgs_token}`} }
      );
      const assinaturas = await resAssin.json();
      const assinatura = assinaturas[0];
      const status = assinatura?.status || 'Trial';
      const planoId = assinatura?.plano_id;

      // Busca limite do plano no banco
      let limiteFuncionarios = 50; // padrão Trial sem assinatura
      let nomeAssinatura = 'Trial';

      if (planoId) {
        const resPlano = await fetch(
          `${SUPA_URL}/rest/v1/planos?id=eq.${planoId}&select=nome,limite_funcionarios`,
          { headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${sgs_token}`} }
        );
        const planos = await resPlano.json();
        if (planos.length) {
          limiteFuncionarios = planos[0].limite_funcionarios;
          nomeAssinatura = planos[0].nome;
        }
      } else {
        // Sem assinatura = Trial → busca limite do plano Trial no banco
        const resTrialPlano = await fetch(
          `${SUPA_URL}/rest/v1/planos?nome=eq.Trial&select=nome,limite_funcionarios`,
          { headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${sgs_token}`} }
        );
        const trialPlanos = await resTrialPlano.json();
        if (trialPlanos.length) {
          limiteFuncionarios = trialPlanos[0].limite_funcionarios;
          nomeAssinatura = trialPlanos[0].nome;
        }
      }

      const isPago = status === 'Ativo';
      const isEnterprise = limiteFuncionarios >= 99999;

      // Busca total de funcionários já cadastrados pelo cliente
      let totalJaCadastrado = 0;
      try {
        const resTotal = await fetch(
          `${SUPA_URL}/rest/v1/empresas?user_id=eq.${sgs_user?.id}&ativo=eq.true&select=total_funcionarios_previsto`,
          { headers: {'apikey': SUPA_KEY, 'Authorization': `Bearer ${sgs_token}`} }
        );
        const empData = await resTotal.json();
        totalJaCadastrado = empData.reduce((a, e) => a + (e.total_funcionarios_previsto || 0), 0);
      } catch(e) { console.log('Erro ao buscar total:', e); }

      const totalComNovo = totalJaCadastrado + numFuncs;

      if (!isEnterprise && totalComNovo > limiteFuncionarios) {
        const restante = Math.max(0, limiteFuncionarios - totalJaCadastrado);
        const aviso = document.getElementById('aviso-limite');
        if (aviso) aviso.remove();
        const el = document.createElement('div');
        el.id = 'aviso-limite';
        el.style.cssText = 'background:#2a1515;border:1px solid #4a2020;border-radius:10px;padding:14px 18px;margin-top:12px;font-size:13px;color:#e05555;';
        el.innerHTML = !isPago
          ? `⚠️ No plano <strong style="color:#e8eaf0;">${nomeAssinatura}</strong> o limite total é de <strong style="color:#e8eaf0;">${limiteFuncionarios.toLocaleString('pt-BR')} funcionários</strong> entre todas as empresas. Você já tem <strong style="color:#e8eaf0;">${totalJaCadastrado}</strong> cadastrados — restam <strong style="color:#e8eaf0;">${restante}</strong> disponíveis.
            <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
              <a href="assinar.html" style="display:inline-block;padding:7px 16px;background:#4a7cdc;color:#fff;border-radius:6px;font-size:12px;font-weight:500;text-decoration:none;">Fazer upgrade do plano</a>
              <a href="https://wa.me/5594981564271?text=Ol%C3%A1%21%20Preciso%20de%20suporte%20no%20SGS%20%E2%80%94%20Sistema%20de%20Gest%C3%A3o%20em%20SST." target="_blank" style="display:inline-block;padding:7px 16px;background:#1a4a38;color:#2dd4a0;border-radius:6px;font-size:12px;font-weight:500;text-decoration:none;">Falar com suporte</a>
            </div>`
          : `⚠️ O limite do plano <strong style="color:#e8eaf0;">${nomeAssinatura}</strong> é de <strong style="color:#e8eaf0;">${limiteFuncionarios.toLocaleString('pt-BR')} funcionários</strong> no total. Você já tem <strong style="color:#e8eaf0;">${totalJaCadastrado}</strong> cadastrados.
            <div style="margin-top:10px;">
              <a href="https://wa.me/5594981564271?text=Ol%C3%A1%21%20Preciso%20de%20suporte%20no%20SGS%20%E2%80%94%20Sistema%20de%20Gest%C3%A3o%20em%20SST." target="_blank" style="display:inline-block;padding:7px 16px;background:#1a4a38;color:#2dd4a0;border-radius:6px;font-size:12px;font-weight:500;text-decoration:none;">Falar com suporte via WhatsApp</a>
            </div>`;
        document.getElementById('btn-salvar').parentNode.insertBefore(el, document.getElementById('btn-salvar'));
        document.getElementById('spinner-salvar').className = 'spinner';
        document.getElementById('btn-salvar').disabled = true;
        document.getElementById('btn-salvar-label').textContent = 'Limite excedido';
        document.getElementById('status-salvar').className = 'status-bar';
        return;
      }

      // Remove aviso anterior se dentro do limite
      const avisoAnterior = document.getElementById('aviso-limite');
      if (avisoAnterior) avisoAnterior.remove();

    } catch(e) { console.log('Erro ao verificar plano:', e); }
  }

  // Só mostra salvando se passou pela validação
  document.getElementById('spinner-salvar').className='spinner show';
  document.getElementById('btn-salvar-label').textContent='Salvando...';
  document.getElementById('btn-salvar').disabled=true;
  setStatus('status-salvar','info','Salvando no banco de dados...');
  const empresa={
    razao_social:razao,
    user_id:sgs_user?.id||null,
    empresa_mae_id:(_maeId||window._maeIdDinamico)||null,
    tipo_empresa:(_maeId||window._maeIdDinamico)?'FILIAL':'MATRIZ',
    nome_fantasia:document.getElementById('nome_fantasia').value||null,
    cnpj_raiz:raw.slice(0,8),
    telefone:document.getElementById('telefone').value||null,
    email:document.getElementById('email').value||null,
    endereco:document.getElementById('endereco').value||null,
    cidade:document.getElementById('cidade').value||null,
    estado:document.getElementById('estado').value||null,
    cep:document.getElementById('cep').value.replace(/\D/g,'')||null,
    grau_risco:gr,
    total_funcionarios_previsto:fn?parseInt(fn):null,
    atividade_rural:rural,
    ativo:ativo
  };
  const cnaesParaSalvar=cnaes.map(c=>({cnae:c.cnae,descricao:c.descricao,tipo:c.tipo,grau_risco:c.gr||null,ativo:true}));
  try{
    const id=await salvarNoSupabase(empresa,cnaesParaSalvar);
    setStatus('status-salvar','success','✓ Empresa cadastrada com sucesso!');
    const maeParaRedir = _maeId || window._maeIdDinamico;
    if (maeParaRedir) { setTimeout(() => { window.location.href = `empresa_detalhe.html?id=${maeParaRedir}`; }, 1500); }
  }catch(e){
    setStatus('status-salvar','error',`Erro ao salvar: ${e.message}`);
  }finally{
    document.getElementById('spinner-salvar').className='spinner';
    document.getElementById('btn-salvar-label').textContent='Salvar no Sistema';
    document.getElementById('btn-salvar').disabled=false;
  }
}

function limparTudo(){
  document.querySelectorAll('input').forEach(e=>{e.value='';e.classList.remove('filled','error');});
  document.querySelectorAll('select').forEach(e=>e.selectedIndex=0);
  cnaes=[];rural=false;ativo=true;
  document.getElementById('toggle-rural').classList.remove('on');
  document.getElementById('toggle-ativo').classList.add('on');
  document.getElementById('gr-box').style.display='none';
  document.getElementById('gr-hint').textContent='Preenchido automaticamente pela tabela NR-4 após busca do CNPJ.';
  document.getElementById('cnae-list').innerHTML='<div style="color:var(--text3);font-size:13px;padding:12px 0;">CNAEs serão carregados após a consulta do CNPJ.</div>';
  ['card-dados','card-contato','card-endereco','card-sst','card-cnaes'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const a=document.getElementById('actions-bar');a.style.opacity='.3';a.style.pointerEvents='none';
  document.getElementById('status-busca').className='status-bar';
  document.getElementById('status-salvar').className='status-bar';
  // Remove todos os avisos
  ['aviso-existe','aviso-grupo','aviso-limite'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.remove();
  });
  window._maeIdDinamico = null;
}
</script>
