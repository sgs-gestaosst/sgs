<head>
<meta charset="UTF-8">

<title>SGS — Permissões de Trabalho</title>

<style>
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3044;--border-focus:#4a7cdc;
  --accent:#4a7cdc;--accent2:#2dd4a0;--text:#e8eaf0;--text2:#8892a4;--text3:#545e72;
  --danger:#e05555;--warning:#e0a855;--success:#2dd4a0;
  --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.header-logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.08em;border:1px solid var(--border-focus);padding:4px 10px;border-radius:var(--radius);text-decoration:none;}
.header-title{font-size:13px;color:var(--text2);flex:1;}
.container{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
.voltar{font-size:12px;color:var(--text2);text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;}
.voltar:hover{color:var(--text);}
.hero{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px;}
.hero-info{flex:1;}
.hero-nome{font-size:16px;font-weight:500;}
.hero-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#5a8ce8;}
.btn-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-edit:hover{border-color:var(--border-focus);}
.btn-save{background:var(--accent2);color:#0f1117;}
.btn-save:hover{background:#3de8b4;}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-cancel:hover{border-color:var(--danger);color:var(--danger);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);font-size:12px;padding:6px 12px;}
.btn-danger:hover{background:#2a1515;}
.btn-sm{padding:5px 12px;font-size:12px;}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-value{font-size:20px;font-weight:600;}
/* Filtros */
.filtros{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filtro-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:12px;padding:7px 10px;outline:none;}
.filtro-busca{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;}
.filtro-busca:focus,.filtro-select:focus{border-color:var(--border-focus);}
/* PT card */
.pt-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;transition:border-color .15s;cursor:pointer;}
.pt-card:hover{border-color:var(--border-focus);}
.pt-tipo-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pt-info{flex:1;}
.pt-numero{font-size:11px;font-family:var(--mono);color:var(--accent);margin-bottom:3px;}
.pt-servico{font-size:13px;font-weight:500;margin-bottom:5px;}
.pt-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--text2);}
/* Badges */
.mini-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--mono);white-space:nowrap;display:inline-block;}
.mb-aberta{background:#1a2540;color:#7aabf7;border:1px solid #2a4070;}
.mb-exec{background:#2a2010;color:#e0a855;border:1px solid #4a3a10;}
.mb-conc{background:#0e2820;color:#2dd4a0;border:1px solid #1a4a38;}
.mb-canc{background:#2a1515;color:#e05555;border:1px solid #4a2020;}
/* Status bar */
.status-bar{display:none;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:12px;align-items:center;gap:8px;}
.status-bar.show{display:flex;}
.status-bar.success{background:#0e2820;border:1px solid #1a4a38;color:var(--success);}
.status-bar.error{background:#2a1515;border:1px solid #4a2020;color:var(--danger);}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.spinner.show{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px;color:var(--text3);}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:760px;width:100%;margin:auto;max-height:88vh;overflow-y:auto;}
.modal-titulo{font-size:16px;font-weight:500;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-field{margin-bottom:0;}
.modal-field.full{grid-column:1/-1;}
.modal-field label{display:block;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--border-focus);}
.modal-field textarea{resize:vertical;min-height:72px;}
/* Checklist interno */
.chk-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.chk-item:last-child{border-bottom:none;}
.chk-texto{flex:1;font-size:13px;}
.chk-btns{display:flex;gap:6px;flex-shrink:0;}
.chk-btn{padding:4px 10px;border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s;}
.chk-btn.sim.active{background:#0e2820;color:#2dd4a0;border-color:#1a4a38;}
.chk-btn.nao.active{background:#2a1515;color:#e05555;border-color:#4a2020;}
.chk-btn.na.active{background:#1e2333;color:var(--text3);border-color:var(--border);}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(3,1fr);}.modal-grid{grid-template-columns:1fr;}.header-title{display:none;}}
</style>
</head>

</div>

function renderChecks(containerId,lista,prefixo){
  const el=document.getElementById(containerId);
  el.innerHTML=lista.map((item,i)=>`
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:var(--text2);padding:3px 0;">
      <input type="checkbox" id="${prefixo}-${i}" value="${escHtml(item)}" style="accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;">
      ${escHtml(item)}
    </label>`).join('');
}

function getChecked(prefixo,lista){
  return lista.filter((_,i)=>document.getElementById(`${prefixo}-${i}`)?.checked).join(', ');
}

function setChecked(prefixo,lista,valoresStr){
  if(!valoresStr)return;
  const valores=valoresStr.split(', ');
  lista.forEach((item,i)=>{
    const el=document.getElementById(`${prefixo}-${i}`);
    if(el)el.checked=valores.includes(item);
  });
}

const STATUS_CLS={'Aberta':'mb-aberta','Em execução':'mb-exec','Concluída':'mb-conc','Cancelada':'mb-canc'};

function escHtml(s){const str=s===null||s===undefined?'':(s+'');return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setStatus(id,tipo,msg){const el=document.getElementById(id);if(!el)return;el.className=`status-bar show ${tipo}`;el.innerHTML=`<span>${{success:'✓',error:'✕',info:'↻'}[tipo]||''}</span><span>${msg}</span>`;}
function clearStatus(id){const el=document.getElementById(id);if(el)el.className='status-bar';}
function fmtData(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('pt-BR');}
function hoje(){return new Date().toISOString().split('T')[0];}
function gerarNumeroPT(){const d=new Date();return`PT-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(pts.length+1).padStart(3,'0')}`;}

async function inicializar(){
  document.getElementById('link-voltar').href=`empresa_detalhe.html?id=${empresaId}`;
  try{
    const [resEmp,resSets,resPTs]=await Promise.all([
      fetch(`${SUPA_URL}/rest/v1/empresas?id=eq.${empresaId}&select=id,nome_fantasia,razao_social`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`}}),
      fetch(`${SUPA_URL}/rest/v1/setores?empresa_id=eq.${empresaId}&ativo=eq.true&select=id,nome_setor&order=nome_setor.asc`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`}}),
      fetch(`${SUPA_URL}/rest/v1/permissoes_trabalho?empresa_id=eq.${empresaId}&ativo=eq.true&select=*&order=criado_em.desc`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`}}),
    ]);
    [empresa,setores,pts]=await Promise.all([resEmp.json(),resSets.json(),resPTs.json()]);
    empresa=empresa[0];
    const nome=empresa?.nome_fantasia||empresa?.razao_social||'Empresa';
    document.getElementById('hero-nome').textContent=`Permissões de Trabalho — ${nome}`;
    document.getElementById('header-nome').textContent=nome;
    renderStats();renderLista();
  }catch(e){console.error(e);}
}

function renderStats(){
  const total=pts.length;
  const abertas=pts.filter(p=>p.status==='Aberta').length;
  const exec=pts.filter(p=>p.status==='Em execução').length;
  const conc=pts.filter(p=>p.status==='Concluída').length;
  const canc=pts.filter(p=>p.status==='Cancelada').length;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:var(--text);">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Abertas</div><div class="stat-value" style="color:#7aabf7;">${abertas}</div></div>
    <div class="stat-card"><div class="stat-label">Em execução</div><div class="stat-value" style="color:var(--warning);">${exec}</div></div>
    <div class="stat-card"><div class="stat-label">Concluídas</div><div class="stat-value" style="color:var(--success);">${conc}</div></div>
    <div class="stat-card"><div class="stat-label">Canceladas</div><div class="stat-value" style="color:var(--danger);">${canc}</div></div>`;
  document.getElementById('hero-sub').textContent=`${total} PTs emitidas · ${abertas} abertas · ${exec} em execução`;
}

function renderLista(){
  const busca=document.getElementById('filtro-busca').value.toLowerCase();
  const tipo=document.getElementById('filtro-tipo').value;
  const status=document.getElementById('filtro-status').value;
  const el=document.getElementById('lista-pts');
  const filtradas=pts.filter(p=>{
    if(busca&&!p.numero_pt.toLowerCase().includes(busca)&&!p.descricao_servico.toLowerCase().includes(busca))return false;
    if(tipo&&p.tipo!==tipo)return false;
    if(status&&p.status!==status)return false;
    return true;
  });
  if(!filtradas.length){el.innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:12px;">📋</div>Nenhuma PT encontrada.</div>`;return;}
  el.innerHTML=filtradas.map(p=>{
    const setor=setores.find(s=>s.id===p.setor_id);
    const cor=TIPO_CORES[p.tipo]||{bg:'#1e2333',brd:'#2a3044'};
    const icone=TIPO_ICONES[p.tipo]||'📋';
    const stCls=STATUS_CLS[p.status]||'mb-info';
    return`<div class="pt-card" onclick="abrirDetalhesPT(${p.id})">
      <div class="pt-tipo-icon" style="background:${cor.bg};border:1px solid ${cor.brd};">${icone}</div>
      <div class="pt-info">
        <div class="pt-numero">${escHtml(p.numero_pt)}</div>
        <div class="pt-servico">${escHtml(p.descricao_servico)}</div>
        <div class="pt-meta">
          <span class="mini-badge ${stCls}">${p.status}</span>
          <span class="mini-badge" style="background:${cor.bg};color:var(--text2);border:1px solid ${cor.brd};">${p.tipo}</span>
          <span>📅 ${fmtData(p.data_emissao)}</span>
          ${p.hora_inicio?`<span>🕐 ${p.hora_inicio}${p.hora_termino?' → '+p.hora_termino:''}</span>`:''}
          ${setor?`<span>🗂️ ${escHtml(setor.nome_setor)}</span>`:''}
          ${p.responsavel_emissao?`<span>👤 ${escHtml(p.responsavel_emissao)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button class="btn btn-sm btn-edit" onclick="event.stopPropagation();imprimirPT(${p.id})">🖨️ Imprimir</button>
        <button class="btn btn-sm btn-edit" onclick="event.stopPropagation();editarPT(${p.id})">✏️ Editar</button>
        ${p.status==='Aberta'?`<button class="btn btn-sm btn-edit" onclick="event.stopPropagation();mudarStatus(${p.id},'Em execução')" style="color:var(--warning);border-color:var(--warning);">▶ Iniciar</button>`:''}
        ${p.status==='Em execução'?`<button class="btn btn-sm btn-edit" onclick="event.stopPropagation();mudarStatus(${p.id},'Concluída')" style="color:var(--success);border-color:var(--success);">✓ Concluir</button>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── CHECKLIST ─────────────────────────────────────────
async function atualizarChecklist(){
  const tipo=document.getElementById('pt-tipo').value;
  document.getElementById('chk-tipo-label').textContent=tipo;
  const itens=CHECKLISTS_PT[tipo]||[];
  chkRespostas={};
  document.getElementById('lista-checklist').innerHTML=itens.map(item=>`
    <div class="chk-item" id="chk-${item.id}">
      <div class="chk-texto">${escHtml(item.texto)}</div>
      <div class="chk-btns">
        <button class="chk-btn sim" onclick="responderChk(${item.id},'Sim')">✓ Sim</button>
        <button class="chk-btn nao" onclick="responderChk(${item.id},'Não')">✕ Não</button>
        <button class="chk-btn na" onclick="responderChk(${item.id},'N/A')">N/A</button>
      </div>
    </div>`).join('');
  // Mostra campos de inventário conforme tipo
  const campoEC=document.getElementById('campo-ec');
  const campoANC=document.getElementById('campo-anc');
  if(campoEC)campoEC.style.display=tipo==='Espaço Confinado'?'block':'none';
  if(campoANC)campoANC.style.display=tipo==='Trabalho em Altura'?'block':'none';
  // Carrega inventários se necessário
  if(tipo==='Espaço Confinado'){
    try{
      const res=await fetch(`${SUPA_URL}/rest/v1/espacos_confinados?empresa_id=eq.${empresaId}&ativo=eq.true&status=eq.Ativo&select=id,identificacao,nome,localizacao&order=identificacao.asc`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`}});
      const ecs=await res.json();
      const sel=document.getElementById('pt-ec');
      sel.innerHTML='<option value="">— Selecione do inventário —</option>'+ecs.map(e=>`<option value="${e.id}">${escHtml(e.identificacao)} — ${escHtml(e.nome)}${e.localizacao?' ('+e.localizacao+')':''}</option>`).join('');
    }catch(e){console.error(e);}
  }
  if(tipo==='Trabalho em Altura'){
    try{
      const res=await fetch(`${SUPA_URL}/rest/v1/pontos_ancoragem?empresa_id=eq.${empresaId}&ativo=eq.true&status=eq.Aprovado&select=id,identificacao,localizacao,tipo&order=identificacao.asc`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`}});
      const ancs=await res.json();
      const sel=document.getElementById('pt-anc');
      sel.innerHTML='<option value="">— Selecione do inventário —</option>'+ancs.map(a=>`<option value="${a.id}">${escHtml(a.identificacao)} — ${escHtml(a.localizacao)}${a.tipo?' ('+a.tipo+')':''}</option>`).join('');
    }catch(e){console.error(e);}
  }
}

function responderChk(itemId,resp){
  chkRespostas[itemId]=resp;
  const wrap=document.getElementById(`chk-${itemId}`);
  wrap.querySelectorAll('.chk-btn').forEach(b=>b.classList.remove('active'));
  const mapa={Sim:'sim',Não:'nao','N/A':'na'};
  wrap.querySelector(`.chk-btn.${mapa[resp]}`)?.classList.add('active');
}

function editarPT(id){
  const p=pts.find(x=>x.id===id);
  if(!p)return;
  ptEditando=p;
  document.getElementById('modal-pt-titulo').textContent='Editar PT — '+p.numero_pt;
  document.getElementById('label-pt').textContent='Salvar alterações';
  document.getElementById('pt-modal-esq').innerHTML=`
    <div style="display:flex;gap:6px;">
      <button class="btn btn-danger btn-sm" onclick="cancelarPT(${id})">Cancelar PT</button>
    </div>`;
  const selSet=document.getElementById('pt-setor');
  selSet.innerHTML='<option value="">— Geral —</option>'+setores.map(s=>`<option value="${s.id}" ${p.setor_id==s.id?'selected':''}>${escHtml(s.nome_setor)}</option>`).join('');
  document.getElementById('pt-tipo').value=p.tipo;
  document.getElementById('pt-numero').value=p.numero_pt||'';
  document.getElementById('pt-servico').value=p.descricao_servico||'';
  document.getElementById('pt-local').value=p.local_servico||'';
  document.getElementById('pt-data').value=p.data_emissao||'';
  document.getElementById('pt-validade').value=p.validade||'1 turno';
  document.getElementById('pt-hora-ini').value=p.hora_inicio||'';
  document.getElementById('pt-hora-fim').value=p.hora_termino||'';
  document.getElementById('pt-solicitante').value=p.solicitante||'';
  document.getElementById('pt-responsavel').value=p.responsavel_emissao||'';
  document.getElementById('pt-executantes').value=p.executantes||'';
  document.getElementById('pt-medidas').value=p.medidas_controle||'';
  document.getElementById('pt-obs').value=p.observacoes||'';
  renderChecks('riscos-checks',RISCOS_LISTA,'risco');
  renderChecks('epis-checks',EPIS_LISTA,'epi');
  setChecked('risco',RISCOS_LISTA,p.riscos_identificados||'');
  setChecked('epi',EPIS_LISTA,p.epis_necessarios||'');
  // Carrega respostas do checklist
  atualizarChecklist();
  fetch(`${SUPA_URL}/rest/v1/pt_checklist_respostas?pt_id=eq.${id}&select=*`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`}})
  .then(r=>r.json()).then(resps=>{
    resps.forEach(r=>{responderChk(r.item_id,r.resposta);});
  });
  clearStatus('status-pt');
  document.getElementById('modal-pt').classList.add('show');
}

function fecharModalPT(){document.getElementById('modal-pt').classList.remove('show');ptEditando=null;chkRespostas={};}

async function salvarPT(){
  const servico=document.getElementById('pt-servico').value.trim();
  if(!servico){alert('Descreva o serviço a ser executado.');return;}
  document.getElementById('btn-salvar-pt').disabled=true;
  document.getElementById('spinner-pt').className='spinner show';
  const tipo=document.getElementById('pt-tipo').value;
  const payload={
    empresa_id:parseInt(empresaId),
    setor_id:parseInt(document.getElementById('pt-setor').value)||null,
    numero_pt:document.getElementById('pt-numero').value.trim(),
    tipo,descricao_servico:servico,
    local_servico:document.getElementById('pt-local').value.trim()||null,
    data_emissao:document.getElementById('pt-data').value||hoje(),
    validade:document.getElementById('pt-validade').value,
    hora_inicio:document.getElementById('pt-hora-ini').value||null,
    hora_termino:document.getElementById('pt-hora-fim').value||null,
    solicitante:document.getElementById('pt-solicitante').value.trim()||null,
    responsavel_emissao:document.getElementById('pt-responsavel').value.trim()||null,
    executantes:document.getElementById('pt-executantes').value.trim()||null,
    riscos_identificados:getChecked('risco',RISCOS_LISTA)||null,
    medidas_controle:document.getElementById('pt-medidas').value.trim()||null,
    epis_necessarios:getChecked('epi',EPIS_LISTA)||null,
    observacoes:document.getElementById('pt-obs').value.trim()||null,
    status:ptEditando?ptEditando.status:'Aberta',ativo:true
  };
  try{
    let ptId;
    if(ptEditando){
      const res=await fetch(`${SUPA_URL}/rest/v1/permissoes_trabalho?id=eq.${ptEditando.id}`,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${token}`,'Prefer':'return=representation'},body:JSON.stringify(payload)});
      if(!res.ok){const e=await res.json();throw new Error(e.message);}
      const d=await res.json();
      const idx=pts.findIndex(x=>x.id===ptEditando.id);
      if(idx>=0)pts[idx]=d[0];
      ptId=ptEditando.id;
    }else{
      const res=await fetch(`${SUPA_URL}/rest/v1/permissoes_trabalho`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${token}`,'Prefer':'return=representation'},body:JSON.stringify(payload)});
      if(!res.ok){const e=await res.json();throw new Error(e.message);}
      const d=await res.json();
      pts.unshift(d[0]);ptId=d[0].id;
    }
    // Salva respostas do checklist
    const itens=CHECKLISTS_PT[tipo]||[];
    for(const item of itens){
      const resp=chkRespostas[item.id]||'Pendente';
      await fetch(`${SUPA_URL}/rest/v1/pt_checklist_respostas`,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${token}`,'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({pt_id:ptId,item_id:item.id,item_texto:item.texto,resposta:resp})
      });
    }
    fecharModalPT();renderStats();renderLista();
  }catch(e){setStatus('status-pt','error',e.message);}
  finally{document.getElementById('btn-salvar-pt').disabled=false;document.getElementById('spinner-pt').className='spinner';}
}

async function mudarStatus(id,novoStatus){
  await fetch(`${SUPA_URL}/rest/v1/permissoes_trabalho?id=eq.${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${token}`},body:JSON.stringify({status:novoStatus,atualizado_em:new Date().toISOString()})});
  const idx=pts.findIndex(p=>p.id===id);
  if(idx>=0)pts[idx].status=novoStatus;
  renderStats();renderLista();
}

async function cancelarPT(id){
  const motivo=prompt('Motivo do cancelamento:');
  if(motivo===null)return;
  await fetch(`${SUPA_URL}/rest/v1/permissoes_trabalho?id=eq.${id}`,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${token}`},body:JSON.stringify({status:'Cancelada',motivo_cancelamento:motivo,atualizado_em:new Date().toISOString()})});
  const idx=pts.findIndex(p=>p.id===id);
  if(idx>=0){pts[idx].status='Cancelada';pts[idx].motivo_cancelamento=motivo;}
  fecharModalPT();renderStats();renderLista();
}

function abrirDetalhesPT(id){editarPT(id);}

      <div class="campo"><div class="campo-label">Data</div><div class="campo-value">${new Date(p.data_emissao+'T00:00:00').toLocaleDateString('pt-BR')}</div></div>
      <div class="campo"><div class="campo-label">Horário</div><div class="campo-value">${p.hora_inicio||'—'} → ${p.hora_termino||'—'}</div></div>
      <div class="campo"><div class="campo-label">Solicitante</div><div class="campo-value">${escHtml(p.solicitante||'—')}</div></div>
      <div class="campo"><div class="campo-label">Responsável pela emissão</div><div class="campo-value">${escHtml(p.responsavel_emissao||'—')}</div></div>
      <div class="campo campo-full"><div class="campo-label">Executantes</div><div class="campo-value">${escHtml(p.executantes||'—')}</div></div>
    </div>

    <div class="secao">2. Riscos potenciais identificados</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4pt;border:1pt solid #e5e7eb;border-radius:3pt;padding:8pt;margin-bottom:8pt;">
      ${RISCOS_LISTA.map(r=>{
        const marcado=p.riscos_identificados&&p.riscos_identificados.split(', ').includes(r);
        return`<div style="display:flex;align-items:center;gap:4pt;font-size:8.5pt;padding:2pt 0;">
          <span style="width:12pt;height:12pt;border:1pt solid #374151;border-radius:2pt;display:inline-flex;align-items:center;justify-content:center;font-size:9pt;flex-shrink:0;${marcado?'background:#0d2040;color:#fff;':''}">
            ${marcado?'✓':''}
          </span>
          <span style="color:${marcado?'#1a1a2e':'#9ca3af'};">${escHtml(r)}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="secao">3. Equipamentos de proteção necessários</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4pt;border:1pt solid #e5e7eb;border-radius:3pt;padding:8pt;margin-bottom:8pt;">
      ${EPIS_LISTA.map(e=>{
        const marcado=p.epis_necessarios&&p.epis_necessarios.split(', ').includes(e);
        return`<div style="display:flex;align-items:center;gap:4pt;font-size:8.5pt;padding:2pt 0;">
          <span style="width:12pt;height:12pt;border:1pt solid #374151;border-radius:2pt;display:inline-flex;align-items:center;justify-content:center;font-size:9pt;flex-shrink:0;${marcado?'background:#0d2040;color:#fff;':''}">
            ${marcado?'✓':''}
          </span>
          <span style="color:${marcado?'#1a1a2e':'#9ca3af'};">${escHtml(e)}</span>
        </div>`;
      }).join('')}
    </div>

    ${p.medidas_controle?`
    <div class="secao">4. Medidas de controle / Recomendações</div>
    <div style="background:#fffbeb;border:1pt solid #f59e0b;border-radius:3pt;padding:8pt;font-size:9pt;color:#92400e;margin-bottom:8pt;">${escHtml(p.medidas_controle)}</div>`:''}

    <div class="secao">${p.medidas_controle?'5':'4'}. Checklist — ${escHtml(p.tipo)}</div>
    <table class="chk-table">
      <thead><tr><th style="width:70%;">Item de verificação</th><th style="text-align:center;">Resp.</th><th>Observação</th></tr></thead>
      <tbody>
        ${itensChk.map(item=>{
          const r=respostas.find(x=>x.item_id===item.id)||{resposta:'Pendente',observacao:''};
          return`<tr>
            <td>${escHtml(item.texto)}</td>
            <td style="text-align:center;"><span class="chk-badge" style="background:${RES_BG[r.resposta]||'#f9fafb'};color:${RES_COR[r.resposta]||'#6b7280'};">${r.resposta}</span></td>
            <td style="font-size:8pt;color:#6b7280;">${escHtml(r.observacao||'')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    ${p.observacoes?`<div class="aviso">⚠️ Observações: ${escHtml(p.observacoes)}</div>`:''}

    <div class="secao">${p.medidas_controle?'6':'5'}. Assinaturas</div>
    <div class="ass-grid">
      <div class="ass-box"><div class="ass-linha"><div class="ass-nome">${escHtml(p.solicitante||'_______________________')}</div><div class="ass-label">Solicitante</div></div></div>
      <div class="ass-box"><div class="ass-linha"><div class="ass-nome">${escHtml(p.responsavel_emissao||'_______________________')}</div><div class="ass-label">Responsável pela emissão</div></div></div>
      <div class="ass-box"><div class="ass-linha"><div class="ass-nome">_______________________</div><div class="ass-label">Executante / Encarregado</div></div></div>
    </div>
    <div style="margin-top:16pt;font-size:8pt;color:#9ca3af;text-align:center;border-top:1pt solid #e5e7eb;padding-top:6pt;">
      Esta PT é válida somente para o serviço e período especificados. Qualquer alteração nas condições requer nova emissão.
      · ${escHtml(nome)} · SGS Sistema de Gestão em SST
    </div>
  </div></body></html>`;
  const win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
  win.onload=()=>win.print();
}

document.getElementById('modal-pt').addEventListener('click',e=>{
  if(e.target.id==='modal-pt')fecharModalPT();
});

inicializar();
</script>
</body>
</html>
